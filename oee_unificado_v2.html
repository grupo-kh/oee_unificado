  matrizTabla(d){
    const mots=d.motivos||[]; const maqs=d.maquinas||[];
    if(!maqs.length)return '<div class="empty">Sin paros para el filtro seleccionado</div>';
    const f2=v=>(v==null||v===0)?'':(Math.round(v*100)/100).toFixed(2);
    const pct=v=>(v==null||v==='')?'':v+'%';
    const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const e=v=>esc(v==null?'':v);
    // Formato condicional salmón: % < 75 (suave) y gradiente de horas por motivo.
    const salMot=v=>(v==null)?'':(v>3?'sal3':v>2?'sal2':v>1?'sal1':'');
    // Bloque izquierdo (SAGE,TOTAL,D,R,C,OEE,ini,fin,real). salPct: aplicar salmón
    // <75 en los % (solo en referencias; NO en máquina ni TOTAL).
    const n0=v=>(v==null||v==='')?'':Math.round(v).toLocaleString('es-ES');
    const n1=v=>(v==null||v==='')?'':(Math.round(v*10)/10).toLocaleString('es-ES');
    const cells=(o,salPct)=>{
      const pTd=v=>`<td class="mtx-disp${(salPct&&v!=null&&v!==''&&v<75)?' sal1':''}">${pct(v)}</td>`;
      return `<td>${e(o.sage)}</td><td>${f2(o.tot)}</td>`+pTd(o.dd)+pTd(o.rr)+pTd(o.cc)+pTd(o.oo)+
        `<td class="mtx-real">${f2(o.prep)}</td>`+
        `<td class="mtx-fab">${e(o.ini)}</td><td class="mtx-fab">${e(o.fin)}</td>`+
        `<td class="mtx-real">${n0(o.utot)}</td><td class="mtx-real">${n0(o.uteo)}</td>`+
        `<td class="mtx-real">${n0(o.phreal)}</td><td class="mtx-real">${n1(o.phteo)}</td>`+
        `<td class="mtx-real">${f2(o.real)}</td>`;
    };
    let h='<div class="mtx-wrap"><table class="mtx"><thead><tr>';
    h+='<th class="mtx-first">Máquina / Referencia</th>';
    h+='<th>Nom. SAGE</th><th>TOTAL (h)</th><th>Disp. %</th><th>Rend. %</th><th>Cal. %</th><th>OEE %</th><th>Preparación (h)</th><th>Inicio fab.</th><th>Fin fab.</th><th>Uds. Total fab.</th><th>Uds. Teo fab.</th><th>Pzs/h real</th><th>Rdto. Teo</th><th>Fab. real (h)</th>';
    mots.forEach(m=>h+=`<th>${esc(m)}</th>`);
    h+='</tr></thead><tbody>';
    // Fila TOTAL por motivo (horizontal, ARRIBA).
    h+='<tr class="mtx-tot"><td class="mtx-first">TOTAL</td>'+cells({tot:d.total_general},false);
    mots.forEach(m=>h+=`<td>${f2(d.total_por_motivo[m])}</td>`);
    h+='</tr>';
    maqs.forEach(mq=>{
      const disp=mq.disponibilidad==null?'':mq.disponibilidad;
      h+=`<tr class="mtx-maq"><td class="mtx-first" data-cod="${esc(mq.cod_maquina)}" data-name="${esc(mq.maquina)}" data-disp="${disp}" title="Clic para ver el histograma de toda la máquina">${esc(mq.maquina)}</td>`;
      h+=cells({tot:mq.total,dd:mq.disponibilidad,rr:mq.rendimiento,cc:mq.calidad,oo:mq.oee},false);
      mots.forEach(m=>h+=`<td>${f2(mq.por_motivo[m])}</td>`);
      h+='</tr>';
      (mq.referencias||[]).forEach(r=>{
        h+=`<tr><td class="mtx-first mtx-ref" data-cod="${esc(mq.cod_maquina)}" data-ref="${esc(r.referencia)}" data-maq="${esc(mq.maquina)}" title="Clic para ver el histograma de esta referencia">${esc(r.referencia)}</td>`;
        h+=cells({sage:r.nomenclatura,tot:r.total,dd:r.disponibilidad,rr:r.rendimiento,cc:r.calidad,oo:r.oee,prep:r.fab_prep,utot:r.uds_total,uteo:r.uds_teo,phreal:r.ph_real,phteo:r.ph_teo,ini:r.fab_inicio,fin:r.fab_fin,real:r.fab_real},true);
        mots.forEach(m=>{const v=r.por_motivo[m];h+=`<td class="${salMot(v)}">${f2(v)}</td>`;});
        h+='</tr>';
      });
    });
    h+='</tbody></table></div>';
    return h;
  },
  histPopupShell(titulo,sub){
    const ov=document.createElement('div'); ov.className='fullpop';
    ov.innerHTML=`
      <div class="fullpop-head">
        <h2>${titulo}<small>${sub}</small></h2>
        <button class="hmClose">✕ Cerrar</button>
      </div>
      <div class="fullpop-body">${this.histDateBar(fDesde.value,fHasta.value,this.turnos())}<div class="hmBody">${this.loadingHtml()}</div></div>`;
    document.body.appendChild(ov);
    ov.querySelector('.hmClose').style.cssText='background:#f3f4f6;border:none;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#6b7280';
    ov.querySelector('.hmClose').onclick=()=>ov.remove();
    return ov;
  },
  histMaquina(cod,name,disp){
    // Histograma de toda la máquina: cronograma (Gantt) con una fila por
    // REFERENCIA fabricada, paros coloreados por motivo.
    const dispTxt=(disp===''||disp==null||disp==='null')?'':` · Disponibilidad ${disp}%`;
    const ov=this.histPopupShell('📊 Histograma · '+name,'Cronograma de paros por referencia'+dispTxt);
    const wrap=ov.querySelector('.hmBody');
    this.histWire(ov.querySelector('.fullpop-body'),(dd,hh,tt)=>this.renderHistMaqRefs(wrap,cod,dd,hh,tt));
    this.renderHistMaqRefs(wrap,cod,fDesde.value,fHasta.value,this.turnos());
  },
  async renderHistMaqRefs(wrap,cod,desde,hasta,turnos){
    wrap.innerHTML=this.loadingHtml();
    try{
      const d=await this.get('oee_unificado_hist_maquina.php',this.histParams({cod_maquina:cod},desde,hasta,turnos));
      const ev=d.eventos||[];
      if(!ev.length){wrap.innerHTML='<div class="empty">Sin paros en el rango para esta máquina</div>';return;}
      const byMot={};
      ev.forEach(e=>{(byMot[e.motivo]=byMot[e.motivo]||[]).push(e);});
      const motivos=Object.keys(byMot);
      const series=motivos.map(m=>({name:m,data:byMot[m].map(e=>({
        x:e.referencia||'(sin referencia)',y:[this.ts(e.inicio),this.ts(e.fin)],inicio:e.inicio,fin:e.fin,segundos:e.segundos}))}));
      const nRef=new Set(ev.map(e=>e.referencia||'(sin referencia)')).size;
      const h=Math.min(1600,Math.max(320,nRef*52+200));
      wrap.innerHTML=`<div class="breadcrumb">Total horas de paro: <b>${(d.total_horas||0).toFixed(1)} h</b> · ${ev.length} paros · ${nRef} referencias · ${motivos.length} motivos${d.eventos_limitados?' (limitado a 5000)':''}</div><div class="apx"></div>`;
      this.apex(wrap.querySelector('.apx'),{
        chart:{type:'rangeBar',height:h,animations:{enabled:false},toolbar:{show:true,tools:{zoom:true,pan:true,reset:true,zoomin:true,zoomout:true,download:true}},zoom:{enabled:true,type:'x'}},
        series, colors:motivos.map((m,i)=>PALETTE[i%PALETTE.length]),
        plotOptions:{bar:{horizontal:true,barHeight:'80%',rangeBarGroupRows:true}},
        xaxis:{type:'datetime'}, dataLabels:{enabled:false}, legend:{position:'bottom'},
        tooltip:{custom:({seriesIndex,dataPointIndex,w})=>{
          const p=w.config.series[seriesIndex].data[dataPointIndex];
          return `<div style="padding:8px;font-size:12px"><b>${w.config.series[seriesIndex].name}</b><br>${p.x}<br>${p.inicio} → ${p.fin}<br><b>${(p.segundos/60).toFixed(1)} min</b></div>`;
        }}
      });
    }catch(e){wrap.innerHTML=`<div class="error">${e.message}</div>`;}
  },
  histReferencia(cod,refName,maqName){
    // Histograma enfocado a UNA referencia: una fila por MOTIVO de esa referencia.
    const ov=this.histPopupShell('📊 Histograma · '+refName,maqName+' · cronograma de paros por motivo');
    const wrap=ov.querySelector('.hmBody');
    this.histWire(ov.querySelector('.fullpop-body'),(dd,hh,tt)=>this.renderHistRef(wrap,cod,refName,dd,hh,tt));
    this.renderHistRef(wrap,cod,refName,fDesde.value,fHasta.value,this.turnos());
  },
  async renderHistRef(wrap,cod,refName,desde,hasta,turnos){
    wrap.innerHTML=this.loadingHtml();
    try{
      const d=await this.get('oee_unificado_hist_maquina.php',this.histParams({cod_maquina:cod},desde,hasta,turnos));
      const ev=(d.eventos||[]).filter(e=>(e.referencia||'(sin referencia)')===refName);
      if(!ev.length){wrap.innerHTML='<div class="empty">Sin paros para esta referencia en el rango</div>';return;}
      const byMot={};
      ev.forEach(e=>{(byMot[e.motivo]=byMot[e.motivo]||[]).push(e);});
      const motivos=Object.keys(byMot);
      const series=motivos.map(m=>({name:m,data:byMot[m].map(e=>({
        x:m,y:[this.ts(e.inicio),this.ts(e.fin)],inicio:e.inicio,fin:e.fin,segundos:e.segundos}))}));
      const totH=ev.reduce((a,e)=>a+(e.segundos||0),0)/3600;
      const h=Math.min(1200,Math.max(300,motivos.length*56+200));
      wrap.innerHTML=`<div class="breadcrumb">Total horas de paro: <b>${totH.toFixed(1)} h</b> · ${ev.length} paros · ${motivos.length} motivos${d.eventos_limitados?' (datos limitados a 5000)':''}</div><div class="apx"></div>`;
      this.apex(wrap.querySelector('.apx'),{
        chart:{type:'rangeBar',height:h,animations:{enabled:false},toolbar:{show:true,tools:{zoom:true,pan:true,reset:true,zoomin:true,zoomout:true,download:true}},zoom:{enabled:true,type:'x'}},
        series, colors:motivos.map((m,i)=>PALETTE[i%PALETTE.length]),
        plotOptions:{bar:{horizontal:true,barHeight:'70%'}},
        xaxis:{type:'datetime'}, dataLabels:{enabled:false}, legend:{position:'bottom'},
        tooltip:{custom:({seriesIndex,dataPointIndex,w})=>{
          const p=w.config.series[seriesIndex].data[dataPointIndex];
          return `<div style="padding:8px;font-size:12px"><b>${w.config.series[seriesIndex].name}</b><br>${p.inicio} → ${p.fin}<br><b>${(p.segundos/60).toFixed(1)} min</b></div>`;
        }}
      });
    }catch(e){wrap.innerHTML=`<div class="error">${e.message}</div>`;}
  }
};
App.init();
</script>
</body>
</html>
