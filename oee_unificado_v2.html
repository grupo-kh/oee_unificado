<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="assets/img/kh.ico">
<title>OEE Unificado · KH</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#eef1f5;color:#1f2937}
.wrap{max-width:1600px;margin:0 auto;padding:18px}
header{background:#fff;padding:18px 20px;border-radius:10px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-top:4px solid #A31416}
.brand{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.brand-logo{height:46px;width:auto;flex-shrink:0}
h1{font-size:22px;color:#111827;margin:0}
.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
.fg{display:flex;flex-direction:column;position:relative}
label{font-size:11px;font-weight:600;color:#6b7280;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
input[type=date],select,.btn{padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;background:#fff}
input[type=date]:focus,select:focus{outline:none;border-color:#A31416;box-shadow:0 0 0 2px rgba(163,20,22,.15)}
.turno-row{display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.chk{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:500}
.chk input{width:16px;height:16px;cursor:pointer}
.quick{display:flex;gap:6px;margin-left:auto}
.quick button{padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;background:#f3f4f6;border:1px solid #d1d5db;border-radius:6px}
.quick button:hover{background:#e5e7eb}
.quick button.active{background:#A31416;color:#fff;border-color:#A31416}
.btn{cursor:pointer;font-weight:600}
.btn:hover{background:#f3f4f6}
.btn-pri{background:#A31416;color:#fff;border-color:#A31416}
.btn-pri:hover{background:#7d0f11}
.excl-toggle{display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer}
.excl-count{background:#A31416;color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700;min-width:20px;text-align:center}
.excl-panel{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:#fff;border:1px solid #d1d5db;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.15);z-index:50;display:none;max-height:340px;overflow:hidden;flex-direction:column;width:300px}
.excl-panel.open{display:flex}
.excl-search{padding:8px;border:none;border-bottom:1px solid #eee;font-size:13px;width:100%}
.excl-search:focus{outline:none}
.excl-list{overflow-y:auto;padding:4px}
.excl-grp{font-size:10px;font-weight:700;color:#9ca3af;padding:8px 8px 4px;text-transform:uppercase}
.excl-item{display:flex;align-items:center;gap:8px;padding:6px 8px;cursor:pointer;font-size:13px;border-radius:5px}
.excl-item:hover{background:#f3f4f6}
.excl-bar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:10px}
.excl-chip{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;border-radius:14px;padding:3px 10px;font-size:12px;display:flex;align-items:center;gap:6px}
.excl-chip button{background:none;border:none;color:#b91c1c;cursor:pointer;font-size:14px;line-height:1}
.excl-clear{font-size:12px;color:#6b7280;background:none;border:none;cursor:pointer;text-decoration:underline}
.infobar{background:#fff;padding:14px 18px;border-radius:10px;margin-bottom:16px;display:flex;gap:22px;flex-wrap:wrap;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.info{display:flex;align-items:center;gap:7px}
.info .l{font-size:11px;color:#9ca3af;text-transform:uppercase;font-weight:600}
.info .v{font-size:14px;font-weight:700;color:#111827}
.tag{background:#dbeafe;color:#1e40af;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700}
.actions{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.actions .btn{font-size:12px;padding:8px 12px}
/* botones de módulos: cada uno con su color distintivo */
.btn-hist{background:#eaf1fb;color:#1e40af;border-color:#bcd3f0}
.btn-hist:hover{background:#d9e7f8}
.btn-cof{background:#fdeee7;color:#9a4420;border-color:#f0c9b6}
.btn-cof:hover{background:#fadfd1}
.btn-topm{background:#e6f3ec;color:#8c181a;border-color:#aedcc1}
.btn-topm:hover{background:#d3eadd}
.btn-topmot{background:#efe9fb;color:#5b3aa6;border-color:#cdbcf0}
.btn-topmot:hover{background:#e3d9f7}
.btn-matriz{background:#2d4d7a;color:#fff;border-color:#24406a}
.btn-matriz:hover{background:#24406a}
/* tabla matriz (popup): cabecera y 1ª columna fijas, scroll horizontal */
.mtx-wrap{overflow:auto;max-height:calc(100vh - 210px);border:1px solid #e5e7eb;border-radius:8px}
.mtx{border-collapse:collapse;font-size:12px;white-space:nowrap}
.mtx th,.mtx td{border:1px solid #f0eeee;padding:5px 9px;text-align:right}
.mtx thead th{position:sticky;top:0;background:#2d4d7a;color:#fff;font-weight:700;z-index:2;text-align:center;white-space:normal;min-width:74px;max-width:120px}
.mtx th.mtx-first,.mtx td.mtx-first{position:sticky;left:0;text-align:left;background:#fff;z-index:1;min-width:250px;max-width:250px;overflow:hidden;text-overflow:ellipsis}
.mtx thead th.mtx-first{z-index:3;min-width:250px}
.mtx tr.mtx-maq td{background:#dce6f4;font-weight:700}
.mtx tr.mtx-maq td.mtx-first{background:#dce6f4;color:#1e40af;cursor:pointer}
.mtx tr.mtx-maq td.mtx-first:hover{background:#cbdcf0;text-decoration:underline}
.mtx td.mtx-ref{padding-left:24px;color:#1e40af;font-weight:500;cursor:pointer}
.mtx td.mtx-ref:hover{background:#f6f3f4;text-decoration:underline}
.mtx tr.mtx-tot td{background:#2d4d7a;color:#fff;font-weight:700}
.mtx td.mtx-disp{font-weight:700;color:#8c181a;text-align:center}
.mtx tr.mtx-tot td.mtx-disp{color:#fff}
.mtx td.mtx-fab{font-size:11px;color:#555;text-align:center;white-space:nowrap}
.mtx td.mtx-real{text-align:right;font-weight:600;color:#3a2426}
/* formato condicional: tonos salmón (override del fondo de fila con !important) */
.mtx td.sal1{background:#fde2d8!important}
.mtx td.sal2{background:#f9c3b0!important}
.mtx td.sal3{background:#f3a088!important}
/* barra de fechas dentro de los popups de histograma */
.hist-datebar{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px;padding:12px 14px;background:#f8fafc;border:1px solid #f0eeee;border-radius:8px}
.hist-datebar .hdb-l{display:flex;flex-direction:column;gap:4px;font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase}
.hist-datebar input[type=date]{font-size:13px}
.hist-datebar .hfReset{background:#f6f3f4;color:#1e40af;border-color:#bcd3f0}
.hist-datebar .hdb-hint{font-size:12px;color:#9ca3af;font-style:italic;align-self:center}
.hist-datebar .hdb-turnos{display:flex;gap:10px;align-items:center;padding-bottom:6px}
.hist-datebar .hdb-chk{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500;color:#374151;text-transform:none;cursor:pointer}
.hist-datebar .hdb-chk input{cursor:pointer}
/* popup a pantalla completa (Top máquinas / Top motivos) */
.fullpop{position:fixed;inset:0;background:#fff;z-index:1500;display:flex;flex-direction:column;overflow:hidden}
.fullpop-head{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid #f0eeee}
.fullpop-head h2{font-size:20px;font-weight:700;color:#111827}
.fullpop-head h2 small{font-weight:500;color:#9ca3af;font-size:13px;margin-left:8px}
.fullpop-filters{display:flex;gap:16px;align-items:flex-end;padding:14px 24px;background:#f8fafc;border-bottom:1px solid #f0eeee;flex-wrap:wrap}
.fullpop-filters label{display:flex;flex-direction:column;gap:5px;margin:0}
.fullpop-body{flex:1;overflow-y:auto;padding:24px}
.content{background:#fff;padding:20px;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
/* KPIs compactos: tira horizontal etiqueta + valor */
.kpis{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.kpi{flex:1;min-width:130px;padding:9px 14px;border-radius:8px;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:10px}
.kpi .kl{font-size:11px;opacity:.9;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.kpi .kv{font-size:20px;font-weight:800;line-height:1}
.kpi.d{background:linear-gradient(135deg,#2d4d7a,#3a2426)}
.kpi.r{background:linear-gradient(135deg,#c45a2c,#9a4420)}
.kpi.c{background:linear-gradient(135deg,#8c181a,#8c181a)}
.kpi.o{background:linear-gradient(135deg,#3a6aa3,#2a4d78)}
.toolbar{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid #f0eeee}
.seg{display:inline-flex;border:1px solid #d1d5db;border-radius:7px;overflow:hidden}
.seg button{padding:8px 16px;border:none;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#374151}
.seg button+button{border-left:1px solid #d1d5db}
.seg button.active{background:#A31416;color:#fff}
/* selector máquina/referencia: color distintivo granate */
#porSeg{border-color:#8c181a}
#porSeg button{color:#8c181a}
#porSeg button.active{background:#8c181a;color:#fff}
.sec-title{font-size:16px;font-weight:700;color:#111827;margin:0 auto 0 0}
.bars{display:flex;flex-direction:column;gap:9px}
.brow{display:flex;align-items:center;gap:12px;padding:4px;border-radius:6px;transition:background .12s}
.brow.clickable{cursor:pointer}
.brow.clickable:hover{background:#f9fafb}
.bname{min-width:190px;max-width:190px;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btrack{flex:1;height:26px;background:#f0eeee;border-radius:5px;overflow:hidden;position:relative}
.bfill{height:100%;border-radius:5px;min-width:2px;transition:width .3s}
.bval{min-width:96px;text-align:right;font-size:13px;font-weight:700}
.hint{font-size:12px;color:#9ca3af;margin-top:12px;font-style:italic}
.loading{text-align:center;padding:40px;color:#9ca3af}
.spinner{display:inline-block;width:34px;height:34px;border:3px solid #f0eeee;border-top-color:#A31416;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{background:#fef2f2;color:#b91c1c;padding:14px;border-radius:8px;border-left:4px solid #b91c1c}
.empty{text-align:center;padding:40px;color:#9ca3af}
/* módulo GENERAL (motivos de paro generales) — fondo más oscuro */
.module-general{margin-top:18px;background:#f4f1f2;border:1px solid #c2a8aa;border-radius:10px}
.module-general .mg-head{padding:13px 18px;border-bottom:1px solid #d9cccd;display:flex;align-items:center;gap:10px}
.module-general .mg-title{font-size:15px;font-weight:700;color:#3a2426}
.module-general .mg-title small{font-weight:500;color:#8a6e70}
.badge-gen{background:#3a2426;color:#fff;font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;letter-spacing:.6px}
.module-general .mg-body{padding:16px 18px}
/* ── Filtro de fechas dentro del popup de análisis ── */
.art-fechas{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;padding:10px 12px;background:#f6f3f4;border:1px solid #d9cccd;border-radius:9px}
.art-fechas input[type=date]{padding:6px 9px;border:1px solid #c2a8aa;border-radius:6px;font-size:13px;background:#fff;color:#3a2426}
.art-fechas .art-q{padding:5px 11px;border:1px solid #c2a8aa;border-radius:6px;background:#fff;color:#3a2426;font-size:12px;font-weight:600;cursor:pointer}
.art-fechas .art-q:hover{background:#e8dede}
.art-fechas .art-q.active{background:#3a6aa3;color:#fff;border-color:#3a6aa3}
.art-fechas .art-q-sep{width:1px;height:22px;background:#d9cccd;margin:0 3px}
/* ── Ventana emergente: Análisis histórico de OF por artículo ── */
.art-overlay{position:fixed;inset:0;background:rgba(15,30,55,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px}
.art-overlay-2{z-index:1100;background:rgba(15,30,55,.35)}
.art-overlay-3{z-index:1200;background:rgba(15,30,55,.3)}
.of-dialog{width:min(900px,94vw)}
.mot-clic tbody tr{cursor:pointer}
.mot-clic tbody tr:hover{background:#f6f3f4}
.art-dialog{background:#f4f1f2;border:1px solid #c2a8aa;border-radius:12px;width:min(1700px,98vw);max-height:94vh;display:flex;flex-direction:column;box-shadow:0 18px 50px rgba(0,0,0,.35)}
.art-dlg-head{padding:14px 18px;border-bottom:1px solid #d9cccd;display:flex;align-items:center;gap:10px}
.art-dlg-logo{height:26px;width:auto;flex-shrink:0;margin-right:2px}
.art-dlg-title{font-size:15px;font-weight:700;color:#3a2426;flex:1}
.art-dlg-title small{font-weight:500;color:#8a6e70}
.art-dlg-x{border:none;background:#e8dede;color:#3a2426;width:30px;height:30px;border-radius:7px;font-size:15px;cursor:pointer;font-weight:700}
.art-dlg-x:hover{background:#c8102e;color:#fff}
.art-dlg-body{padding:16px 18px;overflow:auto}
.art-kpis{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.art-kpi{flex:1 1 150px;background:#fff;border:1px solid #d9cccd;border-radius:9px;padding:10px 14px;display:flex;flex-direction:column;gap:3px}
.art-kpi-acc{border-color:#c45a2c;background:#fdf3ee}
.art-kpi .kl{font-size:11px;color:#8a6e70;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.art-kpi .kv{font-size:22px;font-weight:800;color:#3a2426}
.art-detalle{max-height:min(520px,52vh);overflow:auto;border:1px solid #d9cccd;border-radius:8px;margin-bottom:14px;background:#fff}
.art-chart-title{font-size:13px;font-weight:700;color:#3a2426;margin:6px 0 8px}
/* Scroll horizontal del gráfico de OFs: da aire entre etiquetas cuando hay muchas. */
.art-chart-scroll{overflow-x:auto;overflow-y:hidden;padding-bottom:6px}
/* Detalle OEE de una OF (al clicar una barra) */
.art-of-det{margin-top:16px;background:#fff;border:1px solid #c2a8aa;border-radius:10px;padding:14px 16px}
.art-of-head{font-size:14px;font-weight:700;color:#3a2426;margin-bottom:12px}
.art-of-head small{font-weight:500;color:#8a6e70}
.art-of-kpis{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.art-of-k{flex:1 1 120px;background:#faf8f8;border:1px solid #d9cccd;border-radius:9px;padding:9px 13px;display:flex;flex-direction:column;gap:2px}
.art-of-k .kl{font-size:11px;color:#8a6e70;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.art-of-k .kv{font-size:20px;font-weight:800;color:#3a2426}
.art-of-subt{font-size:13px;font-weight:700;color:#3a2426;margin:4px 0 8px}
/* ───── Rendimiento: histórico por referencia + comparativa por OF ───── */
.rdto-mod .badge-gen{background:#8c181a}
.rdto-controls{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px}
.rdto-controls label{display:flex;flex-direction:column;gap:4px;font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase}
.rdto-controls .rdtoSearch{min-width:170px}
.rdto-controls .rdtoSelect{min-width:340px;max-width:520px;font-size:13px;padding:8px 10px;border:1px solid #d1d5db;border-radius:6px}
.rdto-controls .chk{flex-direction:row;align-items:center;text-transform:none;color:#374151}
.rdto-multi-n{background:#8c181a;color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700}
.rdto-quick{display:flex;gap:6px;align-self:center}
.rdto-quick button{padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;background:#eef3ec;border:1px solid #aedcc1;border-radius:6px;color:#8c181a}
.rdto-quick button:hover{background:#d3eadd}
.rdtoScope{align-self:center}
.rdtoResumen{display:flex;gap:22px;flex-wrap:wrap;background:#eef3f8;border-left:4px solid #8c181a;padding:8px 14px;border-radius:6px;margin-bottom:12px;font-size:13.5px}
.rdtoResumen b{color:#111827}
.rdto-table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:8px;overflow:hidden}
.rdto-table th{background:#8c181a;color:#fff;font-weight:700;padding:8px 10px;text-align:left}
.rdto-table td{border-bottom:1px solid #f0eeee;padding:6px 10px}
.rdto-table td.num{text-align:right;font-variant-numeric:tabular-nums}
.of-chip{background:#8c181a;color:#fff;border:0;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer}
.of-chip:hover{background:#16442b}
.of-chip:disabled{background:#cbd5e1;cursor:default}
.of-cell-chips{display:flex;flex-wrap:wrap;gap:5px}
.of-maq-chip{background:#e6f3ec;color:#8c181a;border:1px solid #aedcc1;border-radius:12px;padding:2px 9px;font-size:11.5px;font-weight:600}
/* comparativa */
.rdto-comp-overall{background:#eef3ec;border:1px solid #aedcc1;border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13.5px;color:#8c181a}
.rdto-comp-rank{margin-top:8px;display:flex;flex-direction:column;gap:3px}
.rdto-comp-rank .rk{display:grid;grid-template-columns:34px 1fr auto auto;gap:10px;font-size:12.5px;padding:2px 0}
.rdto-comp-rank .rk.is-best{font-weight:700}
.rdto-comp-machine{border:1px solid #e5e7eb;border-radius:10px;margin-bottom:16px;background:#fff}
.rdto-comp-machine-head{display:flex;align-items:baseline;gap:8px;padding:10px 14px;border-bottom:1px solid #f0eeee}
.rdto-comp-machine-head .axis{font-size:10px;font-weight:700;color:#9ca3af;letter-spacing:.5px}
.rdto-comp-machine-head h4{font-size:15px;font-weight:700;color:#111827;margin:0}
.rdto-comp-row{display:grid;grid-template-columns:1fr 220px;gap:14px;padding:12px 14px}
.rdto-comp-axis-label{font-size:11px;font-weight:700;color:#8a6e70;margin:4px 0}
.rdto-comp-stats{display:flex;flex-direction:column;gap:8px}
.rdto-comp-stats .st{background:#f8fafc;border:1px solid #f0eeee;border-radius:8px;padding:8px 10px}
.rdto-comp-stats .st .l{font-size:11px;color:#6b7280;font-weight:600}
.rdto-comp-stats .st .v{font-size:18px;font-weight:800;color:#111827}
.rdto-comp-stats .st.ok .v{color:#8c181a}.rdto-comp-stats .st.nok .v{color:#c8102e}
@media(max-width:900px){.rdto-comp-row{grid-template-columns:1fr}}
/* paneles apilados debajo (en lugar de modales) */
#panels{display:flex;flex-direction:column;gap:16px;margin-top:16px}
.panel{background:#fff;border:1px solid #e5e7eb;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);scroll-margin-top:12px;animation:slidein .2s ease}
.panel.general{background:#f4f1f2;border-color:#c2a8aa}
.panel.general .phead{background:#e8dede;border-bottom-color:#d9cccd}
.panel.general .pbody{background:#f4f1f2;border-radius:0 0 12px 12px}
.panel:last-child{border-color:#A31416;box-shadow:0 4px 16px rgba(163,20,22,.16)}
@keyframes slidein{from{opacity:.4;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.phead{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid #f0eeee}
.ptitle{font-size:17px;font-weight:700;color:#111827}
.ptitle small{display:block;font-size:12px;font-weight:500;color:#9ca3af;margin-top:2px}
.pclose{background:#f3f4f6;border:none;padding:7px 12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#6b7280}
.pclose:hover{background:#fee2e2;color:#b91c1c}
.pbody{padding:20px}
.chartbox{position:relative;height:440px}
.chartbox.tall{height:520px}
.selgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.selcard{padding:24px 20px;border:2px solid #e5e7eb;border-radius:12px;cursor:pointer;text-align:center;transition:all .15s;background:#fff}
.selcard:hover{border-color:#A31416;background:#fdf6f6;transform:translateY(-2px);box-shadow:0 8px 20px rgba(163,20,22,.12)}
.selcard .ic{font-size:34px;margin-bottom:10px}
.selcard .t{font-size:16px;font-weight:700;color:#111827;margin-bottom:6px}
.selcard .d{font-size:12px;color:#6b7280}
.evo-toggles{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.evo-tog{display:flex;align-items:center;gap:7px;font-size:13px;cursor:pointer;font-weight:600}
.evo-dot{width:14px;height:14px;border-radius:50%}
.subctrl{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:12px;background:#f8fafc;border-radius:8px}
.subctrl label{margin:0}
.subctrl select,.subctrl input{min-width:150px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;background:#f8fafc;border-bottom:2px solid #f0eeee;font-weight:700;color:#6b7280;font-size:12px;text-transform:uppercase}
td{padding:9px 12px;border-bottom:1px solid #f3f4f6}
tbody tr:hover{background:#f9fafb}
/* módulo Paros individuales: etiquetas en color corporativo para distinguirlas */
.mod-paros th{color:#8c181a;font-weight:700}
.mod-paros .subctrl label{color:#8c181a;font-weight:700}
.mod-paros .breadcrumb{color:#8c181a}
.mod-paros .breadcrumb b{color:#8c181a}
.mod-paros td{color:#6e6d6b}
.breadcrumb{font-size:12px;color:#9ca3af;margin-bottom:14px}
.rdtbl{width:100%;border-collapse:collapse;font-size:13px}
.rdtbl th{background:#f3f6fa;color:#3a2426;font-weight:700;text-align:left;padding:7px 12px;border-bottom:1px solid #e3e9f0;position:sticky;top:0}
.rdtbl td{padding:7px 12px;border-bottom:1px solid #f1f4f8}
.rdtbl th.r,.rdtbl td.r{text-align:right;font-variant-numeric:tabular-nums}
.rdtbl tbody tr:hover{background:#f6f9fc}
.rdtbl tbody tr.ofrow{cursor:pointer}
/* Popup análisis histórico por artículo (réplica QlikView) */
.oa-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:6px}
.oa-kpi{background:#0d2233;border:1px solid #16364f;border-radius:10px;padding:14px 18px}
.oa-kpi-l{font-size:11px;font-weight:700;color:#9fc6e8;text-transform:uppercase;letter-spacing:.5px}
.oa-kpi-v{font-size:34px;font-weight:800;color:#34c0ff;font-variant-numeric:tabular-nums;text-align:right;margin-top:6px;text-shadow:0 0 8px rgba(52,192,255,.35)}
.oa-kpi-v.neg{color:#ff7b6e;text-shadow:0 0 8px rgba(255,123,110,.35)}
.oa-sech{background:#8a1538;color:#fff;font-weight:700;font-size:13.5px;padding:9px 14px;border-radius:7px;margin:18px 0 10px}
.oa-tbl td.neg,.oa-tbl td.r.neg{color:#c8102e;font-weight:700}
.oa-tbl tr.oa-tot td{background:#f6f3f4;font-weight:800;color:#3a2426;border-top:2px solid #c9d6e4}
.ofp-sub{font-size:12.5px;color:#5b6f86;margin:4px 0 12px}
.ofk-row{display:flex;gap:8px;margin-bottom:12px}
.ofk{flex:1;color:#fff;border-radius:8px;padding:8px 10px;text-align:center}
.ofk-l{font-size:10px;opacity:.9;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.ofk-v{font-size:18px;font-weight:800;line-height:1.1}
.ofp-pz{font-size:13px;color:#374151;margin-bottom:12px}
.ofp-h{font-size:13.5px;font-weight:700;color:#3a2426;margin:6px 0 8px}
.breadcrumb b{color:#374151}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px}
.legend span{display:flex;align-items:center;gap:6px;font-size:12px}
.legend i{width:12px;height:12px;border-radius:3px;display:inline-block}
/* popup detalle de OF */
.of-pop{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:2000;display:flex;align-items:center;justify-content:center;padding:24px}
.of-pop-card{background:#fff;border-radius:12px;max-width:580px;width:100%;box-shadow:0 24px 70px rgba(0,0,0,.4);overflow:hidden;animation:pop .15s ease}
.of-pop-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #f0eeee}
.of-pop-head h3{font-size:16px;font-weight:700;color:#3a2426}
.of-pop-body{padding:8px 20px 18px}
.of-pop-row{display:flex;gap:14px;padding:11px 2px;border-bottom:1px solid #f3f4f6}
.of-pop-row:last-child{border-bottom:none}
.of-pop-k{flex:0 0 160px;font-size:12px;font-weight:700;color:#8c181a;text-transform:uppercase;letter-spacing:.3px}
.of-pop-v{flex:1;font-size:14px;color:#6e6d6b;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <img src="assets/img/logo-kh.png" alt="KH" class="brand-logo">
      <h1>OEE Unificado · Disponibilidad de Máquinas</h1>
    </div>
    <div class="filters">
      <div class="fg"><label>Desde</label><input type="date" id="fDesde"></div>
      <div class="fg"><label>Hasta</label><input type="date" id="fHasta"></div>
      <div class="fg"><label>Sección</label>
        <select id="fSeccion"><option value="VARILLAS">Varillas</option><option value="TROQUELADOS">Troquelados</option></select>
      </div>
      <div class="fg"><label>Excluir máquinas</label>
        <div class="btn excl-toggle" id="exclToggle"><span>Seleccionar…</span><span class="excl-count" id="exclCount">0</span></div>
        <div class="excl-panel" id="exclPanel">
          <input type="search" class="excl-search" id="exclSearch" placeholder="Buscar máquina…">
          <div class="excl-list" id="exclList"></div>
        </div>
      </div>
    </div>
    <div class="turno-row">
      <span style="font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase">Turnos:</span>
      <label class="chk"><input type="checkbox" class="turno" value="M" checked> Mañana</label>
      <label class="chk"><input type="checkbox" class="turno" value="T" checked> Tarde</label>
      <label class="chk"><input type="checkbox" class="turno" value="N" checked> Noche</label>
      <div class="quick">
        <button data-r="today">Hoy</button><button data-r="yesterday">Ayer</button>
        <button data-r="week">Semana</button><button data-r="lastweek">Semana anterior</button><button data-r="month">Mes</button>
      </div>
    </div>
    <div class="excl-bar" id="exclBar" style="display:none">
      <span style="font-size:12px;color:#6b7280;font-weight:600">Excluidas:</span>
      <div id="exclChips" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      <button class="excl-clear" id="exclClearAll">Quitar todas</button>
    </div>
  </header>

  <div class="infobar">
    <div class="info"><span class="l">Rango</span><span class="v" id="iRango">—</span></div>
    <div class="info"><span class="l">Sección</span><span class="v tag" id="iSeccion">—</span></div>
    <div class="info"><span class="l">Turnos</span><span class="v" id="iTurnos">—</span></div>
    <div class="info"><span class="l">OFs</span><span class="v" id="iOfs">—</span></div>
    <div class="info"><span class="l">Refs</span><span class="v" id="iRefs">—</span></div>
    <div class="actions">
      <button class="btn btn-hist" onclick="App.openHistograma()">📊 Histograma</button>
      <button class="btn btn-cof" onclick="App.openCambiosOF()">🔄 Cambios en OF</button>
      <button class="btn btn-topm" onclick="App.topModule('maquinas')">🏭 Top máquinas</button>
      <button class="btn btn-topmot" onclick="App.topModule('motivos')">🔧 Top motivos</button>
      <button class="btn btn-matriz" onclick="App.openMatriz()">🧮 Matriz</button>
      <button class="btn btn-pri" onclick="App.exportExcel()">⬇️ Excel</button>
    </div>
  </div>

  <div class="content">
    <div class="kpis" id="kpis"></div>
    <div class="toolbar">
      <span class="sec-title" id="machTitle">Máquinas</span>
      <div class="seg" id="metricSeg">
        <button data-m="disponibilidad" class="active">Disponibilidad</button>
        <button data-m="rendimiento">Rendimiento</button>
        <button data-m="calidad">Calidad</button>
        <button data-m="oee">OEE</button>
      </div>
      <div class="seg" id="porSeg">
        <button data-p="maquina" class="active">Por máquina</button>
        <button data-p="referencia">Por referencia</button>
      </div>
    </div>
    <div id="machBody"><div class="loading"><div class="spinner"></div>Cargando…</div></div>
    <div id="generalBody"></div>
    <div id="rdtoBody"></div>
  </div>

  <div id="panels"></div>
</div>

<script>
const API='api/'; // ruta relativa: funciona con la carpeta actual y tras renombrarla
const COL={oee:'#3a6aa3',disponibilidad:'#2d4d7a',rendimiento:'#c45a2c',calidad:'#8c181a'};
const PALETTE=['#3a6aa3','#c45a2c','#8c181a','#7c3aed','#0891b2','#b45309','#be185d','#4d7c0f','#9a3412','#1e40af','#0f766e','#a16207'];

if(window.ChartDataLabels){
  Chart.register(ChartDataLabels);
  Chart.defaults.set('plugins.datalabels',{
    anchor:'end',align:'top',offset:2,clamp:true,
    font:{size:10,weight:'600'},color:'#374151',
    formatter:v=>v==null||v===''?'':(Math.round(v*10)/10)
  });
}

const State={
  data:null, secciones:[], maquinasActivas:[],
  metrica:'disponibilidad', por:'maquina', seccion:'VARILLAS',
  excl:new Set()
};

const App={
  init(){
    const t=new Date().toISOString().slice(0,10);
    fDesde.value=t; fHasta.value=t; State.seccion=fSeccion.value;
    this.bind(); this.loadMain();
  },
  bind(){
    fDesde.onchange=fHasta.onchange=()=>{this.clearQuick();this.loadMain();};
    fSeccion.onchange=()=>{State.seccion=fSeccion.value;this.loadMain();};
    document.querySelectorAll('.turno').forEach(c=>c.onchange=()=>this.loadMain());
    document.querySelectorAll('.quick button').forEach(b=>b.onclick=()=>this.quickRange(b.dataset.r,b));
    metricSeg.querySelectorAll('button').forEach(b=>b.onclick=()=>{
      metricSeg.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); State.metrica=b.dataset.m;
      porSeg.style.display=(State.metrica==='disponibilidad'||State.metrica==='oee')?'':'none';
      if(porSeg.style.display==='none'){State.por='maquina';this.setPorActive();}
      this.loadMachines();
    });
    porSeg.querySelectorAll('button').forEach(b=>b.onclick=()=>{State.por=b.dataset.p;this.setPorActive();this.loadMachines();});
    exclToggle.onclick=e=>{e.stopPropagation();exclPanel.classList.toggle('open');};
    exclPanel.onclick=e=>e.stopPropagation();
    exclSearch.oninput=()=>this.renderExclList(exclSearch.value);
    exclClearAll.onclick=()=>{State.excl.clear();this.renderExclChips();this.renderExclList(exclSearch.value);this.loadMain();};
    document.onclick=()=>exclPanel.classList.remove('open');
    // Escape: cierra el panel inferior (o el desplegable de excluir)
    document.addEventListener('keydown',e=>{
      if(e.key==='Escape'){
        const pop=document.querySelector('.of-pop');
        if(pop){pop.remove();return;}
        const fps=document.querySelectorAll('.fullpop');
        if(fps.length){fps[fps.length-1].remove();return;}
        const last=panels.lastElementChild;
        if(last){last.remove();const prev=panels.lastElementChild;if(prev)prev.scrollIntoView({behavior:'smooth',block:'start'});}
        else exclPanel.classList.remove('open');
      }
    });
  },
  setPorActive(){porSeg.querySelectorAll('button').forEach(x=>x.classList.toggle('active',x.dataset.p===State.por));},
  clearQuick(){document.querySelectorAll('.quick button').forEach(b=>b.classList.remove('active'));},
  quickRange(r,btn){
    this.clearQuick(); btn.classList.add('active');
    const t=new Date(),d=new Date();
    if(r==='yesterday'){t.setDate(t.getDate()-1);d.setDate(d.getDate()-1);}
    else if(r==='week'){d.setDate(d.getDate()-6);}
    else if(r==='month'){d.setDate(d.getDate()-29);}
    else if(r==='lastweek'){
      // Lunes a domingo de la semana anterior (getDay: 0=dom..6=sab).
      const day=t.getDay(), diffToMon=(day===0?6:day-1);
      d.setDate(d.getDate()-diffToMon-7);   // lunes de la semana pasada
      t.setDate(t.getDate()-diffToMon-1);   // domingo de la semana pasada
    }
    fDesde.value=d.toISOString().slice(0,10); fHasta.value=t.toISOString().slice(0,10);
    this.loadMain();
  },

  turnos(){return [...document.querySelectorAll('.turno:checked')].map(c=>c.value);},
  common(extra={}){
    const p=new URLSearchParams();
    p.set('fecha_desde',fDesde.value); p.set('fecha_hasta',fHasta.value);
    const tu=this.turnos(); if(tu.length&&tu.length<3)p.set('turnos',tu.join(','));
    if(State.excl.size)p.set('excl',[...State.excl].join(','));
    for(const k in extra) if(extra[k]!=null&&extra[k]!=='') p.set(k,extra[k]);
    return p;
  },
  async get(endpoint,params){
    const r=await fetch(API+endpoint+'?'+params.toString());
    const j=await r.json();
    if(j.ok===false) throw new Error(j.error||j.message||'Error');
    return j.data||j;
  },

  async loadMain(){
    machBody.innerHTML='<div class="loading"><div class="spinner"></div>Cargando…</div>';
    panels.innerHTML='';
    try{
      const d=await this.get('oee_unificado.php',this.common({seccion:State.seccion}));
      State.data=d; State.secciones=d.secciones||[];
      State.maquinasActivas=(d.global&&d.global.maquinas_activas)||[];
      this.renderInfo(d); this.renderKpis(); this.renderExclList(exclSearch.value);
      this.loadMachines();
    }catch(e){machBody.innerHTML=`<div class="error">Error cargando datos: ${e.message}</div>`;}
  },
  renderInfo(d){
    iRango.textContent=`${d.fecha_desde} a ${d.fecha_hasta}`;
    iSeccion.textContent=State.seccion;
    iTurnos.textContent=Array.isArray(d.turnos)&&d.turnos.length?d.turnos.join(', '):'M, T, N';
    iOfs.textContent=(d.global&&d.global.num_ofs)??'—';
    iRefs.textContent=(d.global&&d.global.num_refs)??'—';
  },
  renderKpis(){
    const s=State.secciones.find(x=>x.seccion===State.seccion)||{};
    kpis.innerHTML=`
      <div class="kpi d"><span class="kl">Disponibilidad</span><span class="kv">${s.disponibilidad??0}%</span></div>
      <div class="kpi r"><span class="kl">Rendimiento</span><span class="kv">${s.rendimiento??0}%</span></div>
      <div class="kpi c"><span class="kl">Calidad</span><span class="kv">${s.calidad??0}%</span></div>
      <div class="kpi o"><span class="kl">OEE</span><span class="kv">${s.oee??0}%</span></div>`;
  },

  async loadMachines(){
    const esRef=State.por==='referencia';
    machTitle.textContent=(esRef?'Referencias':'Máquinas')+' · '+this.metricLabel(State.metrica)+' · '+State.seccion;
    machBody.innerHTML='<div class="loading"><div class="spinner"></div>Cargando…</div>';
    generalBody.innerHTML='';
    try{
      const d=await this.get('oee_unificado_drill.php',
        this.common({seccion:State.seccion,metrica:State.metrica,por:State.por}));
      const items=d.maquinas||[];
      if(!items.length){machBody.innerHTML='<div class="empty">Sin datos para esta selección</div>';}
      else{
        const unit=esRef?'h':'%';
        const max=esRef?Math.max(...items.map(i=>i.valor),1):100;
        const rdtoMaq=(State.metrica==='rendimiento'&&!esRef);   // rdto por máquina → referencias fabricadas
        const clickable=(State.metrica==='disponibilidad'||State.metrica==='oee'||rdtoMaq);
        const hint=rdtoMaq?'Haz clic en una máquina para ver sus referencias fabricadas (se abre debajo).'
                          :`Haz clic en una ${esRef?'referencia':'máquina'} para analizarla (se abre debajo).`;
        machBody.innerHTML=this.barList(items,{
          name:i=>i.maquina,val:i=>i.valor,unit,max,
          color:i=>unit==='%'?this.semColor(i.valor):'#3a6aa3',clickable
        })+(clickable?`<div class="hint">${hint}</div>`:'');
        if(clickable){
          [...machBody.querySelectorAll('.brow')].forEach((row,ix)=>{
            row.onclick=()=>rdtoMaq
              ? this.rdMaqRefs(items[ix].cod_maquina,items[ix].maquina)
              : (esRef
                  ? this.refMotivos(items[ix].cod_maquina,items[ix].maquina)
                  : this.machineSelector(items[ix].cod_maquina,items[ix].maquina));
          });
        }
      }
      this.renderGeneralMotivos(d.motivos||[]);
      // Histórico + comparativa por referencia ya no se muestran en la pantalla principal:
      // se abren al clicar una referencia en «Referencias fabricadas · {máquina}» (rdRefModulos).
      const rb=document.getElementById('rdtoBody'); if(rb) rb.innerHTML='';
    }catch(e){machBody.innerHTML=`<div class="error">${e.message}</div>`;}
  },

  /* ---------- módulo GENERAL: pareto de motivos de paro ---------- */
  motivoValField(){return State.metrica==='calidad'?'unidades':'horas';},
  motivoValLabel(){return State.metrica==='calidad'?'Unidades NOK':'Horas de paro';},
  renderGeneralMotivos(motivos){
    const esRef=State.por==='referencia';
    if(!motivos.length){generalBody.innerHTML='';return;}
    const vf=this.motivoValField();
    generalBody.innerHTML=`
      <div class="module-general">
        <div class="mg-head">
          <span class="badge-gen">GENERAL</span>
          <span class="mg-title">Motivos de paro generales
            <small>· ${State.seccion} · ${this.metricLabel(State.metrica)} · ${esRef?'por referencia':'por máquina'} · barras = ${this.motivoValLabel().toLowerCase()}, línea = % acumulado</small>
          </span>
        </div>
        <div class="mg-body">
          <div class="chartbox tall"><canvas class="cv"></canvas></div>
          <div class="hint">Haz clic en un motivo para ver su desglose por ${esRef?'referencia':'máquina'} y su distribución horaria (se abre debajo).</div>
        </div>
      </div>`;
    const cv=generalBody.querySelector('.cv');
    let acc=0;
    const labels=motivos.map(m=>m.motivo);
    const vals=motivos.map(m=>m[vf]||0);
    const acum=motivos.map(m=>m.pct_acum!=null?m.pct_acum:(acc+=(m.pct||0)));
    this.chartDestroy(cv);
    new Chart(cv,{data:{labels,datasets:[
      {type:'bar',label:this.motivoValLabel(),data:vals,backgroundColor:'#2d4d7a',yAxisID:'y',order:2,
        datalabels:{anchor:'end',align:'top',color:'#3a2426',formatter:v=>Math.round(v*10)/10}},
      {type:'line',label:'% acumulado',data:acum,borderColor:'#c45a2c',backgroundColor:'#c45a2c',yAxisID:'y1',order:1,tension:0,pointRadius:4,
        datalabels:{anchor:'end',align:'top',color:'#c45a2c',formatter:v=>Math.round(v)+'%'}}
    ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:true}},
      onClick:(e,els)=>{if(els.length)this.openMotivoGeneral(motivos[els[0].index].motivo);},
      scales:{
        x:{ticks:{maxRotation:60,minRotation:30,font:{size:10}}},
        y:{position:'left',beginAtZero:true,grace:'12%',title:{display:true,text:this.motivoValLabel()}},
        y1:{position:'right',beginAtZero:true,max:100,grid:{drawOnChartArea:false},title:{display:true,text:'% acumulado'}}
      }}});
  },
  /* ===== Análisis histórico de OF por artículo (réplica QlikView) =====
     Se abre en ventana emergente (modal) al clicar una referencia en
     «Referencias fabricadas · {máquina}» (Rendimiento → por máquina).
     Compara el rendimiento teórico del sistema (rend_c de F_his_ct) por OF
     contra la media histórica del propio artículo. */
  _artChart:null,
  artModalClose(){
    this.ofModalClose&&this.ofModalClose();   // cierra también el sub-modal de OF
    const m=document.getElementById('artModal');
    if(m)m.remove();
    if(this._artChart){try{this._artChart.destroy();}catch(_){}this._artChart=null;}
    document.removeEventListener('keydown',this._artEsc);
  },
  async openArtAnalisis(cod,name){
    this.artModalClose();
    // Estado propio del popup: fechas independientes del filtro principal, para
    // poder reanalizar el artículo sin salir de la ventana. Inicia con el rango
    // global activo.
    this._art={cod,name,desde:fDesde.value,hasta:fHasta.value};
    const ov=document.createElement('div');
    ov.id='artModal'; ov.className='art-overlay';
    ov.innerHTML=`<div class="art-dialog">
        <div class="art-dlg-head">
          <img src="assets/img/logo-kh.png" alt="KH" class="art-dlg-logo">
          <span class="badge-gen">ARTÍCULO</span>
          <span class="art-dlg-title">Análisis Histórico de OF por Artículo · ${this.esc(cod)}
            <small> · ${this.esc(name||'')}</small></span>
          <button class="art-dlg-x" title="Cerrar">✕</button>
        </div>
        <div class="art-dlg-body">
          <div class="art-fechas" id="artFechas"></div>
          <div id="artContenido">${this.loadingHtml()}</div>
        </div>
      </div>`;
    document.body.appendChild(ov);
    ov.querySelector('.art-dlg-x').onclick=()=>this.artModalClose();
    ov.onclick=e=>{if(e.target===ov)this.artModalClose();};
    this._artEsc=e=>{if(e.key==='Escape')this.artModalClose();};
    document.addEventListener('keydown',this._artEsc);
    this.renderArtFechas();
    this.artRecargar();
  },

  artPreset(k,btn){

    if(k==='yesterday'){t.setDate(t.getDate()-1);d.setDate(d.getDate()-1);}
    else if(k==='week'){const day=t.getDay(),dm=(day===0?6:day-1);d.setDate(d.getDate()-dm);}
    else if(k==='lastweek'){const day=t.getDay(),dm=(day===0?6:day-1);d.setDate(d.getDate()-dm-7);t.setDate(t.getDate()-dm-1);}
    else if(k==='lastmonth'){d.setMonth(d.getMonth()-1,1);t.setDate(0);} // 1º a último día del mes anterior
    else if(k==='3m'){d.setMonth(d.getMonth()-3);}
    else if(k==='6m'){d.setMonth(d.getMonth()-6);}
    else if(k==='year'){d.setFullYear(d.getFullYear()-1);}

  renderArtAnalisis(body,d){
    const ofs=Array.isArray(d.ofs)?d.ofs:[]; const t=d.totales||{};
    const hayNom=ofs.some(o=>o.pzas_hora_nominal!=null);
    if(!ofs.length){body.innerHTML='<div class="empty">Sin OFs para este artículo en el rango seleccionado.</div>';return;}
    // Rendimiento teórico del sistema vs su histórico: media histórica del artículo.
    const rends=ofs.map(o=>o.rend_c||0);
    const media=rends.reduce((a,b)=>a+b,0)/rends.length;

      <div class="art-kpis">
        <div class="art-kpi"><span class="kl">Unidades fabricadas</span><span class="kv">${this.fU(t.unidades)}</span></div>
        <div class="art-kpi"><span class="kl">Horas dedicadas</span><span class="kv">${this.fU(t.horas_dedicadas)}</span></div>
        <div class="art-kpi"><span class="kl">Horas perdidas</span><span class="kv">${this.fU(t.horas_perdidas)}</span></div>
        <div class="art-kpi"><span class="kl">Nº de OFs</span><span class="kv">${this.fU(ofs.length)}</span></div>

        <th class="num">Pzs/h real</th>${hayNom?'<th class="num">Pzs/h nom.</th><th class="num">% nom.</th>':''}
        <th class="num">H. dedic.</th><th class="num">H. perd.</th>
        <th class="num">OK</th><th class="num">NOK</th></tr></thead><tbody>`;
    for(const o of ofs){

      const pctRD=debidas>0?Math.round(o.unidades/debidas*100):0;
      html+=`<tr>

        <td class="num" style="font-weight:600">${pctRD}%</td>
        <td class="num">${this.fU(o.pzas_hora_real)}</td>
        ${hayNom?`<td class="num">${o.pzas_hora_nominal!=null?this.fU(o.pzas_hora_nominal):'—'}</td><td class="num">${o.pct_nominal!=null?o.pct_nominal+'%':'—'}</td>`:''}

    body.innerHTML=html;
    // Etiqueta del eje X en dos líneas: código de OF abreviado + su rendimiento %.
    const labels=ofs.map(o=>[this.ofCorto(o.cod_of), o.rend_c+'%']);
    const cv=body.querySelector('.art-cv');
    // Barras = cantidades fabricadas; color por nivel de rendimiento de la OF.

    const self=this;
    // Piezas reales vs piezas que se deberían haber hecho (al rendimiento 100%).
    const debidas=ofs.map(o=>o.rend_c>0?Math.round(o.unidades/(o.rend_c/100)):0);
    if(this._artChart){try{this._artChart.destroy();}catch(_){}}

        // Captura el clic en toda la columna X (intersect:false), así funciona

        onClick:(e,els,chart)=>{

          if(idx!=null&&ofs[idx]){const o=ofs[idx];self.openOfDetalle(o.cod_of,o.cod_maquina);}
        },
        scales:{x:{ticks:{maxRotation:0,minRotation:0,autoSkip:false,font:{size:12,weight:'600'},color:'#3a2426'}},
                y:{beginAtZero:true,grace:'14%',title:{display:true,text:'unidades fabricadas'}}}}});
    // Refuerzo: listener nativo sobre el canvas. El onClick de Chart.js puede no

  rdCompEmpty(host){ if(!host)return; host.querySelector('.rdtoCompOverall').style.display='none'; host.querySelector('.rdtoCompMachines').innerHTML=''; const e=host.querySelector('.rdtoCompEmpty'); if(e){e.textContent='Sin comparativa para esta referencia en el rango.';e.style.display='';} },
  rdRenderComp(host,d){
    const ofs=d.ofs||[], maqs=d.maquinas_distintas||[], ranking=d.maquina_ranking||[];
    if(!ofs.length||!maqs.length){ this.rdCompEmpty(host); return; }
    host.querySelector('.rdtoCompEmpty').style.display='none';
    const ov=host.querySelector('.rdtoCompOverall');
    if(ranking.length){
      const top=ranking[0];
      let html=`<div><b>Mejor máquina del rango:</b> <b>${this.esc(top.maquina)}</b> · <b>${this.fU(top.uds_h)} uds/h</b> · ${this.fU(top.unidades_ok)} OK en ${this.fU(top.horas)} h · ${this.fU(top.num_ofs)} OF${top.num_ofs===1?'':'s'} · ${(top.nok_pct||0).toFixed(2)}% NOK</div>`;
      if(ranking.length>1) html+='<div class="rdto-comp-rank">'+ranking.map((m,i)=>`<div class="rk ${i===0?'is-best':''}"><span>${i+1}${i===0?' 🏅':''}</span><span>${this.esc(m.maquina)}</span><span>${this.fU(m.uds_h)} uds/h</span><span>${(m.pct_vs_best||0).toFixed(1)}% vs mejor</span></div>`).join('')+'</div>';
      ov.innerHTML=html; ov.style.display='';
    } else ov.style.display='none';
    const C=host.querySelector('.rdtoCompMachines');
    C.innerHTML=maqs.map(m=>{const id=String(m.cod_maquina).replace(/[^a-zA-Z0-9_-]/g,'_');return `<section class="rdto-comp-machine"><div class="rdto-comp-machine-head"><span class="axis">MÁQUINA</span><h4>${this.esc(m.maquina)}</h4></div><div class="rdto-comp-row"><div><div class="rdto-comp-axis-label">piezas / hora por OF</div><div class="rdUp_${id} apx"></div><div class="rdto-comp-axis-label">OK / NOK por OF</div><div class="rdDn_${id} apx"></div></div><aside class="rdto-comp-stats rdSt_${id}"></aside></div></section>`;}).join('');
    maqs.forEach(m=>{
      const id=String(m.cod_maquina).replace(/[^a-zA-Z0-9_-]/g,'_');
      const cells=ofs.map(of=>{const c=(of.maquinas||[]).find(x=>x.cod_maquina===m.cod_maquina);return c?{cod_of:of.cod_of,...c}:null;}).filter(Boolean);
      if(!cells.length){host.querySelector('.rdUp_'+id).innerHTML='<div class="hint">Sin OFs para esta máquina.</div>';return;}
      const cats=cells.map(c=>c.cod_of), udsH=cells.map(c=>+c.uds_h), ok=cells.map(c=>+c.unidades_ok), nok=cells.map(c=>+c.unidades_nok);
      const valid=udsH.filter(v=>v>0), maxV=valid.length?Math.max(...valid):0, minV=valid.length?Math.min(...valid):0, avgV=valid.length?valid.reduce((a,b)=>a+b,0)/valid.length:0;
      const tOk=ok.reduce((a,b)=>a+b,0), tNok=nok.reduce((a,b)=>a+b,0), tAll=tOk+tNok;
      this.apex(host.querySelector('.rdUp_'+id),{chart:{type:'bar',height:240,toolbar:{show:false},animations:{enabled:false}},series:[{name:'piezas/hora',data:udsH}],colors:['#3a6aa3'],plotOptions:{bar:{columnWidth:'45%',borderRadius:2}},xaxis:{categories:cats,labels:{style:{fontSize:'11px',fontWeight:700}}},yaxis:{min:0,labels:{formatter:v=>this.fU(Math.round(v))}},dataLabels:{enabled:cats.length<=14,formatter:v=>v>0?this.fU(Math.round(v)):'',style:{fontSize:'10px',colors:['#fff']}},legend:{show:false},tooltip:{y:{formatter:v=>this.fU(Math.round(v))+' uds/h'}}});
      this.apex(host.querySelector('.rdDn_'+id),{chart:{type:'bar',stacked:true,height:240,toolbar:{show:false},animations:{enabled:false}},series:[{name:'OK',data:ok},{name:'NOK',data:nok}],colors:['#8c181a','#c8102e'],plotOptions:{bar:{columnWidth:'45%',borderRadius:2}},xaxis:{categories:cats,labels:{style:{fontSize:'11px',fontWeight:700}}},yaxis:{min:0,labels:{formatter:v=>this.fU(Math.round(v))}},dataLabels:{enabled:false},legend:{position:'bottom',fontSize:'11px'},tooltip:{shared:true,intersect:false,y:{formatter:v=>this.fU(Math.round(v))+' uds'}}});
      const f2=v=>Number(v).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});
      host.querySelector('.rdSt_'+id).innerHTML=`<div class="st"><div class="l">Máx piezas/hora</div><div class="v">${f2(maxV)}</div></div><div class="st"><div class="l">Mín piezas/hora</div><div class="v">${f2(minV)}</div></div><div class="st"><div class="l">Promedio piezas/hora</div><div class="v">${f2(avgV)}</div></div><div class="st ok"><div class="l">Total OK</div><div class="v">${this.fU(tOk)}</div></div><div class="st nok"><div class="l">Total NOK</div><div class="v">${this.fU(tNok)}</div></div><div class="st"><div class="l">% OK · NOK</div><div class="v">${f2(tAll>0?tOk/tAll*100:0)}% · ${f2(tAll>0?tNok/tAll*100:0)}%</div></div>`;
    });
  },
  // Popup «Análisis Histórico de OF por Artículo» (réplica del cuadro QlikView):
  // KPIs + gráfico Pzas/hora por OF + tabla de detalle. Acotado al rango del filtro principal.

    ov.querySelector('.hmClose').style.cssText='background:#f3f4f6;border:none;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#6b7280';
    const close=()=>ov.remove();
    ov.querySelector('.hmClose').onclick=close; ov.onclick=e=>{if(e.target===ov)close();};
    const body=ov.querySelector('.oaBody');
    try{
      const d=await this.get('oee_unificado_art_analisis.php',this.common({cod_producto:art}));
      const ofs=d.ofs||[], t=d.totales||{};
      if(!ofs.length){body.innerHTML='<div class="empty">Sin OFs para este artículo en el rango.</div>';return;}
      const fU=n=>(Number(n)||0).toLocaleString('es-ES');
      const f2=n=>Number(n||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});
      const lcd=(l,v,neg)=>`<div class="oa-kpi"><div class="oa-kpi-l">${l}</div><div class="oa-kpi-v${neg?' neg':''}">${v}</div></div>`;
      // KPIs
      let h=`<div class="oa-kpis">${lcd('Total Unidades Fabricadas',fU(t.unidades))}${lcd('Horas Dedicadas',f2(t.horas_dedicadas))}${lcd('Horas Perdidas',f2(t.horas_perdidas),(t.horas_perdidas||0)<0)}</div>`;
      // Gráfico Pzas/hora por OF
      h+=`<div class="oa-sech">Rendimiento obtenido por orden de Fabricación (UDS/HORA)</div>`;
      h+=`<div class="chartbox" style="height:380px"><canvas class="oaCv"></canvas></div>`;
      // Tabla de detalle
      const tPerd=ofs.reduce((a,o)=>a+(+o.horas_perdidas||0),0), tPzh=ofs.reduce((a,o)=>a+(+o.pzas_hora_real||0),0);
      h+=`<div class="oa-sech">Rendimiento obtenido por OF</div>`;
      h+='<table class="rdtbl oa-tbl"><thead><tr><th>Año</th><th>Mes</th><th>Cod_OF</th><th>Desc_maquina</th><th>Artículo</th><th class="r">Rend_C</th><th class="r">Horas perdidas</th><th class="r">Horas dedicadas</th><th class="r">Pzas/Hora real</th><th class="r">Uds. fab.</th></tr></thead><tbody>';
      ofs.forEach(o=>{const neg=(+o.horas_perdidas||0)<0;h+=`<tr><td>${o.anio}</td><td>${o.mes}</td><td>${this.esc(o.cod_of)}</td><td>${this.esc(o.desc_maquina)}</td><td>${this.esc(o.cod_articulo)}</td><td class="r">${f2(o.rend_c)}</td><td class="r${neg?' neg':''}">${f2(o.horas_perdidas)}</td><td class="r">${f2(o.horas_dedicadas)}</td><td class="r">${f2(o.pzas_hora_real)}</td><td class="r">${fU(o.unidades)}</td></tr>`;});
      h+=`<tr class="oa-tot"><td colspan="6">TOTAL · ${ofs.length} OF${ofs.length===1?'':'s'}</td><td class="r${tPerd<0?' neg':''}">${f2(tPerd)}</td><td class="r">${f2(t.horas_dedicadas)}</td><td class="r">${f2(tPzh)}</td><td class="r">${fU(t.unidades)}</td></tr>`;
      h+='</tbody></table>';
      body.innerHTML=h;
      // Render gráfico
      const cv=body.querySelector('.oaCv'); this.chartDestroy(cv);
      const palette=['#5a7fa6','#d96459','#9ec45a','#e6c33a','#4fb39a','#7c6bb0','#e08a3c','#5fa8d3','#c45a9a','#8aa05a'];
      new Chart(cv,{type:'bar',data:{labels:ofs.map(o=>o.cod_of),datasets:[{label:'Pzas/Hora real',data:ofs.map(o=>o.pzas_hora_real),backgroundColor:ofs.map((o,i)=>palette[i%palette.length])}]},
        options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:24}},
          plugins:{legend:{display:false},
            datalabels:{anchor:'end',align:'top',color:'#1f2937',font:{size:11,weight:'700'},formatter:v=>Math.round(v).toLocaleString('es-ES')},
            tooltip:{callbacks:{afterBody:items=>{const o=ofs[items[0].dataIndex];return 'Rend '+f2(o.rend_c)+'% · '+fU(o.unidades)+' uds · '+f2(o.horas_dedicadas)+' h';}}}},
          scales:{y:{beginAtZero:false,title:{display:true,text:'piezas / hora'}},x:{ticks:{font:{size:10},maxRotation:60,minRotation:30}}}}});
    }catch(e){body.innerHTML=`<div class="error">${e.message}</div>`;}
  },
  async openMotivoGeneral(motivo){

      const d=await this.get('oee_unificado_motivo_drill.php',
        this.common({seccion:State.seccion,metrica:State.metrica,motivo,por:State.por}));
      const det=d.detalle||[];
      const ph=d.por_hora;
      const vf=this.motivoValField();
      const max=Math.max(...det.map(x=>x[vf]||0),1);

        color:()=>'#2d4d7a',clickable:!esRef});

  },
  async motivoMaqHora(motivo,cod,name){
    const ov=this.push('Distribución horaria · máquina '+name,
      `Motivo «${motivo}» · ${State.seccion} · ${this.metricLabel(State.metrica)}`,
      this.loadingHtml(), true);
    try{
      const d=await this.get('oee_unificado_motivo_drill.php',
        this.common({seccion:State.seccion,metrica:State.metrica,motivo,por:State.por,cod_maquina:cod}));
      const ph=d.por_hora;
      let html=`<div class="breadcrumb">Distribución horaria del motivo <b>${motivo}</b> filtrada a la máquina <b>${name}</b>. Cada barra = franja horaria · duración del paro. <b>Haz clic en una barra</b> para ver la referencia causante.</div>`;
      html+=ph?'<div class="cvh"></div>':'<div class="empty">Sin paros de este motivo para esta máquina en el rango/turnos seleccionados.</div>';
      this.body(ov).innerHTML=html;
      if(ph)this.hourlyChart(this.body(ov).querySelector('.cvh'),ph,(h1,h2)=>this.slotRefs(motivo,cod,name,h1,h2));
    }catch(e){this.body(ov).innerHTML=`<div class="error">${e.message}</div>`;}
  },
  async slotRefs(motivo,cod,name,startH,endH){
    const h1=Math.floor(startH), h2=Math.max(h1,Math.ceil(endH)-1);
    const pad=x=>String(x).padStart(2,'0');
    const ov=this.push('Referencia causante · '+name,`Motivo «${motivo}» · franja ${pad(h1)}:00–${pad(h2+1)}:00 · ${State.seccion}`,this.loadingHtml(),true);
    try{
      const d=await this.get('oee_unificado_motivo_maq_hora_refs.php',
        this.common({seccion:State.seccion,motivo,cod_maquina:cod,hora_desde:h1,hora_hasta:h2}));
      const refs=d.referencias||[];
      if(!refs.length){this.body(ov).innerHTML='<div class="empty">Sin referencia identificada en esa franja</div>';return;}
      const max=Math.max(...refs.map(r=>r.horas||0),1);
      let html=`<div class="breadcrumb">Referencias fabricadas durante el motivo <b>${motivo}</b> en <b>${name}</b>, franja <b>${pad(h1)}:00–${pad(h2+1)}:00</b> (horas de paro atribuidas).</div>`;
      html+=this.barList(refs,{name:r=>r.referencia,val:r=>r.horas||0,unit:'h',max,color:()=>'#8c181a',clickable:false});
      html+='<table style="margin-top:16px"><thead><tr><th>Referencia</th><th>Código</th><th>Horas de paro</th><th>Minutos</th><th>Nº paros</th></tr></thead><tbody>';
      refs.forEach(r=>html+=`<tr><td>${r.referencia}</td><td>${r.cod_referencia||'—'}</td><td>${(r.horas||0).toFixed(2)}</td><td>${(r.minutos||0).toFixed(1)}</td><td>${r.num_paros||0}</td></tr>`);
      html+='</tbody></table>';
      this.body(ov).innerHTML=html;
    }catch(e){this.body(ov).innerHTML=`<div class="error">${e.message}</div>`;}
  },
  hourlyChart(elBox,ph,onSlot){
    // Calidad (unidades): no es tiempo → barras apiladas por hora.
    if(ph.unidad==='uds'){
      elBox.innerHTML='<div class="chartbox tall"><canvas class="cvh2"></canvas></div>';
      const el=elBox.querySelector('.cvh2');
      const labels=ph.horas.map(r=>r.h+'h');
      const ds=ph.maquinas.map((m,i)=>({
        label:m.maquina,data:ph.horas.map(r=>r[m.cod_maquina]||0),
        backgroundColor:PALETTE[i%PALETTE.length],stack:'s',
        datalabels:{display:ctx=>ctx.dataset.data[ctx.dataIndex]>0,color:'#fff',font:{size:9,weight:'600'},formatter:v=>v>0?Math.round(v):''}
      }));
      this.chartDestroy(el);
      new Chart(el,{type:'bar',data:{labels,datasets:ds},options:{
        responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{position:'bottom'}},
        scales:{x:{stacked:true,title:{display:true,text:'Hora del día'}},y:{stacked:true,beginAtZero:true,title:{display:true,text:'Unidades NOK'}}}}});
      return;
    }
    // Horas: línea de tiempo (Gantt) — cada máquina una fila, barras = tramo horario · duración real.
    const fmtDur=d=>d>=1?(Math.round(d*10)/10)+' h':Math.round(d*60)+' min';
    const series=ph.maquinas.map(m=>{
      const cod=m.cod_maquina;
      const rows=ph.horas.filter(r=>(r[cod]||0)>0).map(r=>({h:r.h,v:r[cod]})).sort((a,b)=>a.h-b.h);
      const segs=[];
      rows.forEach(r=>{
        const last=segs[segs.length-1];
        if(last&&r.h===last.lastH+1){last.lastH=r.h;last.lastV=r.v;last.dur+=r.v;}
        else segs.push({startH:r.h,lastH:r.h,lastV:r.v,dur:r.v});
      });
      return {name:m.maquina,data:segs.map(s=>{
        const end=Math.round((s.lastH+s.lastV)*100)/100;
        return {x:m.maquina,y:[s.startH,end],startH:s.startH,endH:end,dur:s.dur};
      })};
    }).filter(s=>s.data.length);
    const nMaq=series.length;
    const h=Math.min(900,Math.max(260,nMaq*56+130));
    elBox.style.height='auto';
    elBox.innerHTML='<div class="apxh"></div>';
    this.apex(elBox.querySelector('.apxh'),{
      chart:{type:'rangeBar',height:h,animations:{enabled:false},toolbar:{show:false},
        events:onSlot?{dataPointSelection:(ev,cx,cfg)=>{const p=cfg.w.config.series[cfg.seriesIndex].data[cfg.dataPointIndex];onSlot(p.startH,p.endH);}}:{}},
      series, colors:ph.maquinas.map((m,i)=>PALETTE[i%PALETTE.length]),
      plotOptions:{bar:{horizontal:true,barHeight:'62%',rangeBarGroupRows:true,dataLabels:{position:'center'}}},
      dataLabels:{enabled:true,formatter:(val,opts)=>{
        const p=opts.w.config.series[opts.seriesIndex].data[opts.dataPointIndex];
        return fmtDur(p.dur);
      },style:{fontSize:'11px',fontWeight:600,colors:['#fff']}},
      xaxis:{type:'numeric',min:0,max:24,tickAmount:12,title:{text:'Hora del día (0–24 h)'},labels:{formatter:v=>Math.round(v)+'h'}},
      legend:{show:false},
      tooltip:{custom:({seriesIndex,dataPointIndex,w})=>{
        const p=w.config.series[seriesIndex].data[dataPointIndex];
        const hh=x=>String(Math.floor(x)).padStart(2,'0')+':'+String(Math.round((x%1)*60)).padStart(2,'0');
        return `<div style="padding:8px;font-size:12px"><b>${w.config.series[seriesIndex].name}</b><br>Tramo ${hh(p.startH)}–${hh(p.endH)}<br>Duración de paro: <b>${fmtDur(p.dur)}</b></div>`;
      }}
    });
  },
  metricLabel(m){return {disponibilidad:'Disponibilidad',rendimiento:'Rendimiento',calidad:'Calidad',oee:'OEE'}[m];},
  semColor(v){return v>=75?'#8c181a':v>=60?'#c98a1a':'#b3402c';},
  barList(items,o){
    return '<div class="bars">'+items.map(i=>{
      const v=o.val(i),w=Math.max(0,Math.min(100,(v/o.max)*100));
      const disp=o.unit==='h'?(v.toFixed?v.toFixed(1):v)+' h'
                 :o.unit==='%'?v+' %'
                 :(v.toLocaleString?v.toLocaleString():v)+' '+(o.unit||'');
      return `<div class="brow${o.clickable?' clickable':''}">
        <div class="bname" title="${o.name(i)}">${o.name(i)}</div>
        <div class="btrack"><div class="bfill" style="width:${w}%;background:${o.color(i)}"></div></div>
        <div class="bval">${disp}</div></div>`;
    }).join('')+'</div>';
  },

  /* ---------- paneles apilados ---------- */
  push(title,sub,bodyHtml,general){
    const ov=document.createElement('div');
    ov.className='panel'+(general?' general':'');
    const badge=general?'<span class="badge-gen">GENERAL</span> ':'';
    ov.innerHTML=`<div class="phead">
      <div class="ptitle">${badge}${title}${sub?`<small>${sub}</small>`:''}</div>
      <button class="pclose">✕ Cerrar</button></div><div class="pbody">${bodyHtml}</div>`;
    panels.appendChild(ov);
    ov.querySelector('.pclose').onclick=()=>{
      // cierra este panel y todos los abiertos debajo
      const rm=[];let n=ov;while(n){rm.push(n);n=n.nextElementSibling;}
      rm.forEach(x=>x.remove());
      const prev=panels.lastElementChild;if(prev)prev.scrollIntoView({behavior:'smooth',block:'start'});
    };
    const focus=()=>ov.scrollIntoView({behavior:'smooth',block:'start'});
    requestAnimationFrame(focus); setTimeout(focus,250);
    return ov;
  },

  async motivoParos(ctx,dia,hora){
    const ov=this.push('Paros individuales · motivo «'+ctx.motivo+'»',`${ctx.name} · ${State.seccion}`,this.loadingHtml());
    ov.classList.add('mod-paros');
    const esRef=ctx.por==='referencia';
    const run=async(day,hr)=>{
      this.body(ov).innerHTML=this.dayHourPicker(day,hr)+this.loadingHtml(); this.bindDayHourPicker(ov,run);
      try{
        const d=await this.get('oee_unificado_maq_motivo_temporal.php',this.tempParams(ctx,{mode:'paros',dia:day,hora:hr}));
        const paros=d.paros||[];
        let tbl='<table><thead><tr><th>Inicio</th><th>Fin</th>'+(esRef?'<th>Máquina</th>':'<th>Referencia</th>')+'<th>Minutos</th></tr></thead><tbody>';
        if(!paros.length)tbl+='<tr><td colspan="4" style="text-align:center;color:#9ca3af">Sin paros en esta franja</td></tr>';
        paros.forEach(p=>tbl+=`<tr><td>${p.fecha_ini||'—'}</td><td>${p.fecha_fin||'—'}</td><td>${esRef?(p.maquina||'—'):(p.referencia||'—')}</td><td>${(p.minutos!=null?(+p.minutos).toFixed(1):'—')}</td></tr>`);
        tbl+='</tbody></table>';
        this.body(ov).innerHTML=this.dayHourPicker(day,hr)+`<div class="breadcrumb">Día <b>${day}</b> · franja <b>${hr}:00–${hr}:59</b></div>`+tbl;
        this.bindDayHourPicker(ov,run);
      }catch(e){this.body(ov).innerHTML=this.dayHourPicker(day,hr)+`<div class="error">${e.message}</div>`;this.bindDayHourPicker(ov,run);}

    run(dia||fDesde.value,hora!=null?hora:8);

  dayPicker(day){return `<div class="subctrl"><label>Día:</label><input type="date" class="dpDay" value="${day}" min="${fDesde.value}" max="${fHasta.value}"></div>`;},
  bindDayPicker(ov,cb){const el=ov.querySelector('.dpDay');if(el)el.onchange=()=>cb(el.value);},
  dayHourPicker(day,hr){
    let opts='';for(let i=0;i<24;i++)opts+=`<option value="${i}" ${i===hr?'selected':''}>${i}:00–${i}:59</option>`;
    return `<div class="subctrl"><label>Día:</label><input type="date" class="dhDay" value="${day}" min="${fDesde.value}" max="${fHasta.value}">
      <label>Franja:</label><select class="dhHour">${opts}</select></div>`;
  },
  bindDayHourPicker(ov,cb){
    const d=ov.querySelector('.dhDay'),h=ov.querySelector('.dhHour');
    if(d)d.onchange=()=>cb(d.value,+h.value); if(h)h.onchange=()=>cb(d.value,+h.value);

  /* ---------- Chart.js helpers (por elemento) ---------- */
  chartDestroy(el){if(el){const ex=Chart.getChart(el);if(ex)ex.destroy();}},
  line(el,labels,datasets,onPoint){
    this.chartDestroy(el);
    return new Chart(el,{type:'line',data:{labels,datasets},options:{
      responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:true}},
      onClick:onPoint?(e,els)=>{if(els.length)onPoint(els[0].index);}:undefined,
      scales:{y:{beginAtZero:true,grace:'12%'}}}});
  },
  bar(el,labels,data,color,onBar){
    this.chartDestroy(el);
    return new Chart(el,{type:'bar',data:{labels,datasets:[{data,backgroundColor:color,datalabels:{anchor:'end',align:'top',color:'#374151'}}]},options:{
      responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      onClick:onBar?(e,els)=>{if(els.length)onBar(els[0].index);}:undefined,
      scales:{y:{beginAtZero:true,grace:'14%'}}}});
  },
  apex(el,opts){
    opts.chart=opts.chart||{};
    opts.chart.redrawOnParentResize=false;
    opts.chart.redrawOnWindowResize=false;
    // Evita el zoom con la rueda del ratón (cambiaba el tamaño al hacer scroll)
    opts.chart.zoom=Object.assign({allowMouseWheelZoom:false},opts.chart.zoom||{});
    const ch=new ApexCharts(el,opts);ch.render();return ch;
  },
  ts(s){return s?new Date(String(s).replace(' ','T')).getTime():null;},

  /* ---------- exclude machines ---------- */
  renderExclList(filter){
    const q=(filter||'').toLowerCase(),grp={};
    State.maquinasActivas.forEach(m=>{(grp[m.seccion]=grp[m.seccion]||[]).push(m);});
    let html='';
    Object.keys(grp).sort().forEach(sec=>{
      const items=grp[sec].filter(m=>m.maquina.toLowerCase().includes(q)||m.cod_maquina.toLowerCase().includes(q));
      if(!items.length)return;
      html+=`<div class="excl-grp">${sec}</div>`;
      items.forEach(m=>html+=`<label class="excl-item"><input type="checkbox" value="${m.cod_maquina}" ${State.excl.has(m.cod_maquina)?'checked':''}> ${m.maquina}</label>`);
    });
    exclList.innerHTML=html||'<div class="excl-grp">Sin resultados</div>';
    exclList.querySelectorAll('input').forEach(cb=>cb.onchange=()=>{
      if(cb.checked)State.excl.add(cb.value);else State.excl.delete(cb.value);
      this.renderExclChips(); this.loadMainDebounced();
    });
  },
  renderExclChips(){
    exclCount.textContent=State.excl.size;
    const look={};State.maquinasActivas.forEach(m=>look[m.cod_maquina]=m.maquina);
    if(!State.excl.size){exclBar.style.display='none';return;}
    exclBar.style.display='flex';
    exclChips.innerHTML=[...State.excl].map(c=>`<span class="excl-chip">${look[c]||c}<button data-c="${c}">×</button></span>`).join('');
    exclChips.querySelectorAll('button').forEach(b=>b.onclick=()=>{
      State.excl.delete(b.dataset.c);this.renderExclChips();this.renderExclList(exclSearch.value);this.loadMain();
    });
  },
  loadMainDebounced(){clearTimeout(this._t);this._t=setTimeout(()=>this.loadMain(),350);},

        {label:'NOK/h',data:refs.map(r=>r.nok_h),backgroundColor:'#e0902a'}
      ]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        layout:{padding:{right:48}},
        plugins:{legend:{position:'bottom'},
          datalabels:{display:ctx=>ctx.dataset.data[ctx.dataIndex]>0,anchor:'end',align:'right',
            color:'#1f2937',font:{size:11,weight:'700'},formatter:v=>Math.round(v).toLocaleString('es-ES')},
          tooltip:{callbacks:{afterBody:items=>{const r=refs[items[0].dataIndex];return 'Total: '+(r.uds_total).toLocaleString('es-ES')+' uds · '+r.horas+' h · Rendimiento '+(r.rend!=null?r.rend:0)+'%';}}}},

  async rdRefOfs(detail,cod,refCod,refName,nomSage){
    const ttl=`OFs · ${refName}${nomSage?(' · '+nomSage):''}`;

      const d=await this.get('oee_unificado_maq_ref_ofs.php',this.common({cod_maquina:cod,cod_producto:refCod}));
      const ofs=d.ofs||[];
      const fU=n=>(Number(n)||0).toLocaleString('es-ES');
      const fmtF=s=>{if(!s)return'—';const p=s.split(' ');const [y,m,dd]=p[0].split('-');return dd+'/'+m+'/'+y.slice(2)+' '+(p[1]||'').slice(0,5);};

      h+='<table class="rdtbl"><thead><tr><th>OF</th><th>Fecha</th><th class="r">OEE %</th><th class="r">Piezas fab.</th><th class="r">Pzas OK</th><th class="r">Pzas NOK</th></tr></thead><tbody>';

  async ofDispPopup(codOf,maqCod){
    const ov=document.createElement('div'); ov.className='of-pop';
    ov.innerHTML=`<div class="of-pop-card"><div class="of-pop-head"><h3>Disponibilidad · OF ${codOf}</h3><button class="mclose" style="background:none;border:none;font-size:22px;cursor:pointer;color:#6b7280;line-height:1">×</button></div><div class="of-pop-body">${this.loadingHtml()}</div></div>`;
    document.body.appendChild(ov);
    const close=()=>ov.remove();
    ov.querySelector('.mclose').onclick=close; ov.onclick=e=>{if(e.target===ov)close();};
    const body=ov.querySelector('.of-pop-body');
    try{
      const d=await this.get('oee_unificado_of_paros.php',this.common({cod_of:codOf,cod_maquina:maqCod}));
      const fU=n=>(Number(n)||0).toLocaleString('es-ES');
      const kpi=(l,v,c)=>`<div class="ofk" style="background:${c}"><div class="ofk-l">${l}</div><div class="ofk-v">${v}%</div></div>`;
      let h=`<div class="ofp-sub">${d.desc_producto||d.producto||''}${d.fecha_ini?(' · '+d.fecha_ini.slice(0,16).replace('T',' ')):''}${d.fecha_fin?(' → '+d.fecha_fin.slice(11,16)):''}</div>`;
      h+=`<div class="ofk-row">${kpi('Disp',d.disp,'#2d4d7a')}${kpi('Rend',d.rend,'#c45a2c')}${kpi('Cal',d.cal,'#8c181a')}${kpi('OEE',d.oee,'#3a6aa3')}</div>`;
      h+=`<div class="ofp-pz">Piezas: <b>${fU(d.piezas)}</b> · OK ${fU(d.ok)} · NOK ${fU(d.nok)}</div>`;
      const mot=d.motivos||[];
      h+=`<div class="ofp-h">Motivos de paro · total <b>${(d.total_horas_paro||0).toFixed(1)} h</b></div>`;
      if(mot.length){const max=Math.max(...mot.map(m=>m.horas||0),1);
        h+=this.barList(mot,{name:m=>m.motivo,val:m=>m.horas||0,unit:'h',max,color:()=>'#8c181a',clickable:false});}
      else h+='<div class="empty">Sin paros registrados en esta OF</div>';
      body.innerHTML=h;
    }catch(e){body.innerHTML=`<div class="error">${e.message}</div>`;}
  },

  /* ---------- HISTOGRAMA (ApexCharts rangeBar / Gantt) ---------- */
  // Barra de fechas para acotar el rango del cronograma dentro de su popup
  // (independiente del filtro principal; útil si el rango global es muy amplio).
  histDateBar(d0,h0,turnos){
    const tu=(turnos&&turnos.length)?turnos:['M','T','N'];
    const lbl={M:'Mañana',T:'Tarde',N:'Noche'};
    const chks=['M','T','N'].map(t=>`<label class="hdb-chk"><input type="checkbox" class="hfT" value="${t}" ${tu.includes(t)?'checked':''}> ${lbl[t]}</label>`).join('');
    return `<div class="hist-datebar">
      <label class="hdb-l">Desde<input type="date" class="hfD" value="${d0}"></label>
      <label class="hdb-l">Hasta<input type="date" class="hfH" value="${h0}"></label>
      <span class="hdb-l" style="gap:2px">Turnos<span class="hdb-turnos">${chks}</span></span>
      <button class="btn btn-pri hfGo">Aplicar</button>
      <button class="btn hfReset" title="Volver al rango y turnos del filtro principal">↺ Rango del filtro</button>
      <span class="hdb-hint">Acota rango y turnos para leer mejor el cronograma</span>
    </div>`;
  },
  histWire(el,render){
    const D=el.querySelector('.hfD'),H=el.querySelector('.hfH'),G=el.querySelector('.hfGo'),R=el.querySelector('.hfReset');
    const tsel=()=>[...el.querySelectorAll('.hfT:checked')].map(c=>c.value);
    const go=()=>{ if(D.value&&H.value) render(D.value,H.value,tsel()); };
    G.onclick=go; D.onchange=go; H.onchange=go;
    [...el.querySelectorAll('.hfT')].forEach(c=>c.onchange=go);
    R.onclick=()=>{ D.value=fDesde.value; H.value=fHasta.value; el.querySelectorAll('.hfT').forEach(c=>c.checked=true); go(); };
  },
  // URLSearchParams para el histograma con override de fechas y turnos del popup.
  histParams(extra,desde,hasta,turnos){
    const p=this.common(Object.assign({fecha_desde:desde,fecha_hasta:hasta},extra));
    p.delete('turnos');
    if(turnos&&turnos.length&&turnos.length<3) p.set('turnos',turnos.join(','));
    return p;
  },
  async openHistograma(){
    const tu=this.turnos();
    const ov=this.push('Histograma de motivos','Cronograma de paros por máquina',
      this.histDateBar(fDesde.value,fHasta.value,tu)+'<div class="histwrap"></div>');
    const body=this.body(ov), wrap=body.querySelector('.histwrap');
    this.histWire(body,(dd,hh,tt)=>this.renderHistMaqs(wrap,dd,hh,tt));
    this.renderHistMaqs(wrap,fDesde.value,fHasta.value,tu);
  },
  async renderHistMaqs(wrap,desde,hasta,turnos){
    wrap.innerHTML=this.loadingHtml();
    try{
      const d=await this.get('oee_unificado_hist_maquina.php',this.histParams({},desde,hasta,turnos));
      const ev=d.eventos||[];
      if(!ev.length){wrap.innerHTML='<div class="empty">Sin paros en el rango</div>';return;}
      const byMot={};
      ev.forEach(e=>{(byMot[e.motivo]=byMot[e.motivo]||[]).push(e);});
      const motivos=Object.keys(byMot);
      const series=motivos.map(m=>({name:m,data:byMot[m].map(e=>({
        x:e.maquina,y:[this.ts(e.inicio),this.ts(e.fin)],inicio:e.inicio,fin:e.fin,segundos:e.segundos}))}));
      const nMaq=new Set(ev.map(e=>e.maquina)).size;
      const h=Math.min(1500,Math.max(420,nMaq*48+140));
      wrap.innerHTML=`<div class="breadcrumb">Total horas de paro: <b>${(d.total_horas||0).toFixed(1)} h</b> · ${ev.length} paros · ${nMaq} máquinas${d.eventos_limitados?' (limitado a 5000)':''}</div><div class="apx"></div>`;
      this.apex(wrap.querySelector('.apx'),{
        chart:{type:'rangeBar',height:h,animations:{enabled:false},toolbar:{show:true,tools:{zoom:true,pan:true,reset:true,zoomin:true,zoomout:true,download:true}},zoom:{enabled:true,type:'x'}},
        series, colors:motivos.map((m,i)=>PALETTE[i%PALETTE.length]),
        plotOptions:{bar:{horizontal:true,barHeight:'80%',rangeBarGroupRows:true}},
        xaxis:{type:'datetime'}, dataLabels:{enabled:false}, legend:{position:'bottom'},
        tooltip:{custom:({seriesIndex,dataPointIndex,w})=>{
          const p=w.config.series[seriesIndex].data[dataPointIndex];
          return `<div style="padding:8px;font-size:12px"><b>${w.config.series[seriesIndex].name}</b><br>${p.x}<br>${p.inicio} → ${p.fin}<br><b>${(p.segundos/60).toFixed(1)} min</b></div>`;
        }}
      });
    }catch(e){wrap.innerHTML=`<div class="error">${e.message}</div>`;}
  },

  /* ---------- CAMBIOS EN OF ---------- */

      });
      this.body(ov).innerHTML='<div class="hint" style="margin-top:0">Haz clic en cualquier cambio para ver el detalle completo de su OF.</div><div class="apx"></div><div class="legend lg"></div>';

        chart:{type:'bar',height:460,animations:{enabled:false},toolbar:{show:true,tools:{download:true,zoomin:true,zoomout:true,reset:true}},zoom:{enabled:false},
          events:{dataPointSelection:(e,ctx,cfg)=>{self.showOfDetail(data[cfg.dataPointIndex].meta);}}},
        series:[{name:'Minutos',data}],
        plotOptions:{bar:{horizontal:false,columnWidth:'55%'}},
        dataLabels:{enabled:true,formatter:v=>v+'m',style:{fontSize:'10px'}},
        xaxis:{type:'category',title:{text:'Cambios (1 = más antiguo) · clic para detalle'}},

        tooltip:{custom:({dataPointIndex,w})=>{

          return `<div style="padding:8px;font-size:12px"><b>${p.motivo}</b><br>${p.inicio} → ${p.fin}<br><b>${(p.segundos/60).toFixed(1)} min</b><br>OF: ${p.cod_of||'—'} · Ref: ${p.desc_producto||p.cod_producto||'—'}<br><i>(clic para detalle)</i></div>`;

    const exclBtn=ov.querySelector('.tExclBtn'),exclPanel=ov.querySelector('.tExclPanel'),
          exclList=ov.querySelector('.tExclList'),exclSearch=ov.querySelector('.tExclSearch'),exclN=ov.querySelector('.tExclN');
    const params=extra=>{
      const p=new URLSearchParams();
      p.set('fecha_desde',D.value); p.set('fecha_hasta',H.value); p.set('seccion',st.seccion);
      const tu=this.turnos(); if(tu.length&&tu.length<3)p.set('turnos',tu.join(','));
      if(st.excl.size)p.set('excl',[...st.excl].join(','));
      for(const k in extra)p.set(k,extra[k]);
      return p;
    };
    const renderMaqList=()=>{
      const q=(exclSearch.value||'').toLowerCase();
      const items=st.maqs.filter(m=>m.maquina.toLowerCase().includes(q)||m.cod_maquina.toLowerCase().includes(q));
      exclList.innerHTML=items.map(m=>`<label class="excl-item"><input type="checkbox" value="${m.cod_maquina}" ${st.excl.has(m.cod_maquina)?'checked':''}> ${m.maquina}</label>`).join('')||'<div class="excl-grp">Sin resultados</div>';
      exclList.querySelectorAll('input').forEach(cb=>cb.onchange=()=>{
        if(cb.checked)st.excl.add(cb.value);else st.excl.delete(cb.value);

      });

    const loadMaqList=async()=>{
      exclList.innerHTML='<div class="excl-grp">Cargando…</div>';

        const f=d.fechas||[]; const name=isMaq?item.maquina:item.motivo;

          +(f.length?'<div class="chartbox tall"><canvas class="cvd"></canvas></div>':'<div class="empty">Sin datos por día</div>');
        if(f.length)this.bar(detEl.querySelector('.cvd'),f.map(x=>x.fecha),f.map(x=>x.horas),accent);
        detEl.scrollIntoView({behavior:'smooth',block:'nearest'});
      }catch(e){detEl.innerHTML=`<div class="error">${e.message}</div>`;}
    };
    const load=async()=>{
      topEl.innerHTML=this.loadingHtml(); detEl.innerHTML='';
      try{
        const d=await this.get('oee_unificado_top_analisis.php',params({mode:kind,top_n:N.value}));
        const items=isMaq?(d.maquinas||[]):(d.motivos||[]);
        if(!items.length){topEl.innerHTML='<div class="empty">Sin datos para el filtro seleccionado</div>';return;}
        const max=Math.max(...items.map(i=>i.horas||0),1);
        topEl.innerHTML=`<div style="font-size:15px;font-weight:700;color:#111827;margin-bottom:10px">${isMaq?'Máquinas':'Motivos'} con más horas de paro <small style="font-weight:500;color:#9ca3af">(clic para ver el detalle por día)</small></div>`
          +this.barList(items,{name:i=>isMaq?i.maquina:i.motivo,val:i=>i.horas||0,unit:'h',max,color:()=>accent,clickable:true});
        [...topEl.querySelectorAll('.brow')].forEach((row,ix)=>{row.onclick=()=>loadDetail(items[ix]);});
      }catch(e){topEl.innerHTML=`<div class="error">${e.message}</div>`;}
    };
    // eventos
    exclBtn.onclick=e=>{e.preventDefault();exclPanel.classList.toggle('open');};
    exclSearch.oninput=renderMaqList;
    SEC.onchange=()=>{
      st.seccion=SEC.value; st.excl.clear(); exclN.textContent='0';
      ov.querySelector('.tHsec').textContent='Disponibilidad · '+st.seccion;
      loadMaqList(); load();
    };
    ov.querySelector('.tApply').onclick=load;
    ov.querySelector('.tXlsx').onclick=()=>window.open(API+'oee_unificado_top_export.php?'+params({fmt:'xlsx',mode:kind,top_n:N.value}).toString());
    loadMaqList(); load();
  },
