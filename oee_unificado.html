<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OEE Unificado - Disponibilidad de Máquinas · KH</title>
    <link rel="icon" type="image/x-icon" href="assets/img/kh.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 8px 8px 0 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .filters-section {
            background: white;
            padding: 25px 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="date"],
        select {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-top: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            font-weight: 500;
        }

        .section-selector {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .section-btn {
            padding: 10px 20px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 14px;
        }

        .section-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .section-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .content {
            background: white;
            margin-top: 0;
            padding: 30px;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
            border-left: 4px solid #c33;
        }

        .section-content {
            margin: 30px 0;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }

        .machines-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .machines-table thead {
            background: #f5f5f5;
        }

        .machines-table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #555;
            border-bottom: 2px solid #ddd;
            font-size: 13px;
        }

        .machines-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .machines-table tbody tr:hover {
            background: #f9f9f9;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-high {
            background: #d4edda;
            color: #155724;
        }

        .status-medium {
            background: #fff3cd;
            color: #856404;
        }

        .status-low {
            background: #f8d7da;
            color: #721c24;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .no-data {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .summary-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
        }

        .summary-item {
            text-align: center;
        }

        .summary-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .summary-value {
            font-size: 24px;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .filter-row {
                grid-template-columns: 1fr;
            }

            .section-btn {
                padding: 8px 16px;
                font-size: 12px;
            }

            .stat-card {
                padding: 15px;
            }

            .stat-value {
                font-size: 20px;
            }

            .machines-table {
                font-size: 12px;
            }

            .machines-table th,
            .machines-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 OEE Unificado - Disponibilidad de Máquinas</h1>
        </header>

        <div class="filters-section">
            <form id="filterForm">
                <div class="filter-row">
                    <div class="filter-group">
                        <label for="fechaDesde">Fecha Desde:</label>
                        <input type="date" id="fechaDesde" name="fechaDesde">
                    </div>
                    <div class="filter-group">
                        <label for="fechaHasta">Fecha Hasta:</label>
                        <input type="date" id="fechaHasta" name="fechaHasta">
                    </div>
                </div>

                <div class="filter-row">
                    <div class="filter-group">
                        <label>Turnos:</label>
                        <div class="checkbox-group">
                            <div class="checkbox-item">
                                <input type="checkbox" id="turnoM" name="turnos" value="M">
                                <label for="turnoM">Mañana (M)</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="turnoT" name="turnos" value="T">
                                <label for="turnoT">Tarde (T)</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="turnoN" name="turnos" value="N">
                                <label for="turnoN">Noche (N)</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="section-selector">
                    <button type="button" class="section-btn active" data-section="VARILLAS">
                        Varillas
                    </button>
                    <button type="button" class="section-btn" data-section="TROQUELADOS">
                        Troquelados
                    </button>
                    <button type="button" class="section-btn" data-section="OTROS">
                        Otros
                    </button>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-primary">🔍 Cargar Datos</button>
                    <button type="button" class="btn-secondary" id="resetBtn">↻ Limpiar Filtros</button>
                </div>
            </form>
        </div>

        <div class="content" id="content">
            <div class="empty-state">
                <div style="font-size: 48px; margin-bottom: 20px;">📋</div>
                <p>Selecciona los filtros y haz clic en "Cargar Datos" para ver la disponibilidad de máquinas</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = './api/oee_unificado.php';
        let currentSection = 'VARILLAS';
        let lastData = null;

        // Inicializar fechas
        function initializeDates() {
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];

            document.getElementById('fechaDesde').value = todayStr;
            document.getElementById('fechaHasta').value = todayStr;
        }

        // Obtener parámetros del formulario
        function getFormParams() {
            const turnos = Array.from(document.querySelectorAll('input[name="turnos"]:checked'))
                .map(el => el.value);

            return {
                fecha_desde: document.getElementById('fechaDesde').value,
                fecha_hasta: document.getElementById('fechaHasta').value,
                turnos: turnos
            };
        }

        // Cargar datos del API
        async function loadData() {
            const params = getFormParams();
            const queryString = new URLSearchParams();

            queryString.append('fecha_desde', params.fecha_desde);
            queryString.append('fecha_hasta', params.fecha_hasta);
            params.turnos.forEach(t => queryString.append('turnos[]', t));

            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Cargando datos...</p></div>';

            try {
                const response = await fetch(`${API_URL}?${queryString}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Error al cargar los datos');
                }

                lastData = data;
                renderData(data);
            } catch (error) {
                content.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        // Renderizar datos
        function renderData(data) {
            const content = document.getElementById('content');

            if (!data.secciones || data.secciones.length === 0) {
                content.innerHTML = '<div class="empty-state"><p>No hay datos disponibles para los filtros seleccionados</p></div>';
                return;
            }

            // Filtrar sección actual
            const sectionData = data.secciones.find(s => s.seccion === currentSection);

            if (!sectionData) {
                content.innerHTML = '<div class="empty-state"><p>No hay datos para esta sección</p></div>';
                return;
            }

            // Obtener máquinas de esta sección
            const machines = data.global.maquinas_activas
                .filter(m => m.seccion === currentSection)
                .sort((a, b) => a.maquina.localeCompare(b.maquina));

            let html = '';

            // Resumen global
            html += `
                <div class="summary-card">
                    <div class="summary-grid">
                        <div class="summary-item">
                            <div class="summary-label">Disponibilidad</div>
                            <div class="summary-value">${sectionData.disponibilidad}%</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Rendimiento</div>
                            <div class="summary-value">${sectionData.rendimiento}%</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">Calidad</div>
                            <div class="summary-value">${sectionData.calidad}%</div>
                        </div>
                        <div class="summary-item">
                            <div class="summary-label">OEE</div>
                            <div class="summary-value">${sectionData.oee}%</div>
                        </div>
                    </div>
                </div>
            `;

            // Tabla de máquinas
            if (machines.length > 0) {
                html += `
                    <div class="section-content">
                        <h2 class="section-title">
                            Máquinas - ${currentSection}
                            <span style="font-size: 14px; font-weight: normal; color: #666;">${machines.length} máquinas</span>
                        </h2>
                        <table class="machines-table">
                            <thead>
                                <tr>
                                    <th>Máquina</th>
                                    <th>Código</th>
                                    <th>Disponibilidad</th>
                                    <th>Rendimiento</th>
                                    <th>Calidad</th>
                                    <th>OEE</th>
                                </tr>
                            </thead>
                            <tbody>
                 `;

                machines.forEach(machine => {
                    html += `
                        <tr>
                            <td><strong>${machine.maquina}</strong></td>
                            <td><code>${machine.cod_maquina}</code></td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                        </tr>
                    `;
                });

                html += `
                            </tbody>
                        </table>
                    </div>
                `;
            } else {
                html += '<div class="no-data">No hay máquinas en esta sección</div>';
            }

            content.innerHTML = html;
        }

        // Manejadores de eventos
        document.getElementById('filterForm').addEventListener('submit', (e) => {
            e.preventDefault();
            loadData();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            document.getElementById('filterForm').reset();
            initializeDates();
            document.getElementById('content').innerHTML = `
                <div class="empty-state">
                    <div style="font-size: 48px; margin-bottom: 20px;">📋</div>
                    <p>Selecciona los filtros y haz clic en "Cargar Datos" para ver la disponibilidad de máquinas</p>
                </div>
            `;
        });

        // Selector de secciones
        document.querySelectorAll('.section-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSection = btn.dataset.section;

                if (lastData) {
                    renderData(lastData);
                }
            });
        });

        // Inicializar
        initializeDates();
    </script>
</body>
</html>
