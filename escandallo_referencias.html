<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referencias · Escandallo / Centro / Máquina</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#eef1f5;color:#1f2937}
.wrap{max-width:1500px;margin:0 auto;padding:18px}
header{background:#fff;padding:16px 20px;border-radius:10px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;align-items:center;gap:18px;flex-wrap:wrap}
h1{font-size:20px;color:#1e3a5f}
h1 small{font-weight:500;color:#9ca3af;font-size:13px;margin-left:8px}
.search{margin-left:auto;padding:9px 12px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;min-width:280px}
.chk-comp{display:flex;align-items:center;gap:6px;font-size:13px;color:#374151;font-weight:600;cursor:pointer;white-space:nowrap}
.chk-comp input{cursor:pointer}
.btn-export{padding:9px 14px;border:1px solid #1d5938;background:#1d5938;color:#fff;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer}
.btn-export:hover{background:#17492d}
.layout{display:grid;grid-template-columns:380px 1fr;gap:16px;align-items:start}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden}
.card-h{padding:12px 16px;border-bottom:1px solid #eef0f3;font-weight:700;color:#1e3a5f;font-size:14px;display:flex;align-items:center;gap:8px}
.badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;letter-spacing:.5px;color:#fff}
.badge.sage{background:#8a5a1a}.badge.mapex{background:#1d5938}
.reflist{max-height:72vh;overflow-y:auto}
.refitem{padding:11px 16px;border-bottom:1px solid #f1f4f8;cursor:pointer;transition:background .12s}
.refitem:hover{background:#f6f9fc}
.refitem.active{background:#e3ebf4;border-left:4px solid #2d4d7a;padding-left:12px}
.refitem .rn{font-weight:600;font-size:13.5px;color:#111827;word-break:break-all}
.refitem .rs{font-size:12px;color:#6b7280;margin-top:2px}
.refitem .rc{display:inline-block;margin-top:4px;font-size:11px;font-weight:700;color:#1d5938;background:#e6f3ec;border:1px solid #aedcc1;border-radius:10px;padding:1px 8px}
.detail{display:flex;flex-direction:column;gap:16px}
.det-head{background:#2d4d7a;color:#fff;border-radius:10px;padding:14px 18px}
.det-head .t{font-size:17px;font-weight:700;word-break:break-all}
.det-head .s{font-size:12.5px;opacity:.85;margin-top:3px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f3f6fa;color:#1e3a5f;font-weight:700;text-align:left;padding:8px 14px;border-bottom:1px solid #e3e9f0}
td{padding:8px 14px;border-bottom:1px solid #f1f4f8}
td.num{text-align:right;font-variant-numeric:tabular-nums}
.fase{border-bottom:1px solid #eef0f3;padding:12px 16px}
.fase:last-child{border-bottom:0}
.fase .ft{font-weight:700;color:#1d5938;font-size:13.5px;margin-bottom:8px}
.fase .ft small{font-weight:500;color:#9ca3af}
.maqs{display:flex;flex-wrap:wrap;gap:8px}
.maq{background:#eef3ec;border:1px solid #aedcc1;border-radius:8px;padding:7px 11px;font-size:12.5px}
.maq .mn{font-weight:700;color:#1d5938}
.maq .md{color:#5b6f86;font-size:11.5px}
.empty,.loading{padding:28px;text-align:center;color:#9ca3af;font-style:italic}
.placeholder{padding:60px 20px;text-align:center;color:#9ca3af}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🧩 Referencias · Escandallo / Centro / Máquina<small>componentes, centro y máquina (SAGE)</small></h1>
    <input type="search" class="search" id="search" placeholder="Buscar por nombre o código SAGE…">
    <label class="chk-comp"><input type="checkbox" id="onlyComp"> Solo con componentes</label>
    <button id="btnExport" class="btn-export" title="Exportar a Excel todas las referencias con sus componentes (por pieza)">⬇️ Exportar componentes</button>
  </header>
  <div class="layout">
    <div class="card">
      <div class="card-h">Referencias con escandallo <span class="badge sage">SAGE</span> <span id="refcount" style="margin-left:auto;color:#9ca3af;font-weight:500;font-size:12px"></span></div>
      <div class="reflist" id="reflist"><div class="loading">Cargando…</div></div>
    </div>
    <div id="detail"><div class="card"><div class="placeholder">Selecciona una referencia de la izquierda para ver su escandallo y su centro/máquina.</div></div></div>
  </div>
</div>
<script>
const API='/PLAN_ATTAINMENT/api/';
let REFS=[], CUR=null;
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fU=n=>(Number(n)||0).toLocaleString('es-ES');
const f2=n=>Number(n||0).toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:4});

async function get(ep,params){
  const qs=params?('?'+new URLSearchParams(params)):'';
  const r=await fetch(API+ep+qs); const j=await r.json();
  if(j.ok===false) throw new Error(j.error||j.message||'Error'); return j.data||j;
}

async function loadList(){
  try{
    const d=await get('escandallo_lista.php');
    REFS=d.refs||[];
    renderList();
  }catch(e){ $('#reflist').innerHTML=`<div class="empty">Error: ${esc(e.message)}</div>`; }
}
function renderList(){
  const q=($('#search').value||'').toLowerCase().trim();
  let list=REFS;
  if($('#onlyComp').checked) list=list.filter(r=>r.num_componentes>0);
  if(q) list=list.filter(r=>String(r.desc).toLowerCase().includes(q)||String(r.cod_producto).toLowerCase().includes(q)||String(r.referencia_edi).toLowerCase().includes(q));
  $('#refcount').textContent=list.length+' ref'+(list.length===1?'':'s');
  if(!list.length){ $('#reflist').innerHTML='<div class="empty">Sin referencias con escandallo.</div>'; return; }
  $('#reflist').innerHTML=list.map(r=>`
    <div class="refitem${String(r.cod_producto)===CUR?' active':''}" data-cod="${esc(r.cod_producto)}">
      <div class="rn">${esc(r.desc)}</div>
      <div class="rs">SAGE: ${esc(r.referencia_edi||'—')} · cód: ${esc(r.cod_producto)}</div>
      ${r.num_componentes>0?`<span class="rc" style="color:#8a5a1a;background:#f6ecdb;border-color:#e0c79a">${fU(r.num_componentes)} componente${r.num_componentes===1?'':'s'}</span>`:'<span class="rc" style="color:#9ca3af;background:#f3f4f6;border-color:#e5e7eb">sin componentes</span>'}
    </div>`).join('');
  [...document.querySelectorAll('.refitem')].forEach(el=>el.onclick=()=>selectRef(el.dataset.cod));
}

async function selectRef(cod){
  CUR=cod; renderList();
  const det=$('#detail');
  det.innerHTML='<div class="card"><div class="loading">Cargando detalle…</div></div>';
  try{
    const d=await get('escandallo_detalle.php',{cod_producto:cod});
    renderDetail(d);
  }catch(e){ det.innerHTML=`<div class="card"><div class="empty">Error: ${esc(e.message)}</div></div>`; }
}
function renderDetail(d){
  const r=d.referencia||{}, comps=d.componentes||[], maquinas=d.maquinas||[];
  let h=`<div class="detail">
    <div class="det-head"><div class="t">${esc(r.desc)}</div><div class="s">SAGE: ${esc(r.referencia_edi||'—')} · código: ${esc(r.cod)}</div></div>`;
  // Centro y máquina (máquinas de fabricación del propio artículo)
  h+=`<div class="card"><div class="card-h">Centro y máquina <span class="badge sage">SAGE</span></div>`;
  if(maquinas.length){
    h+='<div style="padding:14px 16px"><div class="maqs">'+maquinas.map(m=>`<div class="maq"><div class="mn">${esc(m.maquina||m.centro)}</div><div class="md">centro ${esc(m.centro)}</div></div>`).join('')+'</div></div>';
  } else h+='<div class="empty">Sin centro/máquina en el escandallo.</div>';
  h+='</div>';
  // Escandallo · componentes
  h+=`<div class="card"><div class="card-h">Escandallo · componentes <span class="badge sage">SAGE</span> <span style="margin-left:auto;color:#9ca3af;font-weight:500;font-size:12px">${comps.length} línea${comps.length===1?'':'s'}</span></div>`;
  if(comps.length){
    h+='<table><thead><tr><th>Componente</th><th>Código</th><th>Centro</th><th>Máquina</th><th class="num">Uds/ud</th></tr></thead><tbody>';
    comps.forEach(c=>h+=`<tr><td>${esc(c.desc)}</td><td>${esc(c.cod)}</td><td>${esc(c.centro||'—')}</td><td>${esc(c.maquina||'—')}</td><td class="num">${f2(c.unidades)}</td></tr>`);
    h+='</tbody></table>';
  } else h+='<div class="empty">Sin componentes en el escandallo.</div>';
  h+='</div></div>';
  $('#detail').innerHTML=h;
}

$('#search').addEventListener('input',renderList);
$('#onlyComp').addEventListener('change',renderList);
$('#btnExport').addEventListener('click',()=>{ window.location.href=API+'escandallo_export.php'; });
loadList();
</script>
</body>
</html>
