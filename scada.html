<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCADA · Máquinas en producción</title>
<style>
  :root{
    --kh:#8c181a; --kh2:#a52225;
    --verde:#2e9e5b; --verde-bg:#e8f5ec;
    --ambar:#d99000; --ambar-bg:#fbf3e0;
    --rojo:#d23b3b;  --rojo-bg:#fbe9e9;
    --azul:#3b7fd2;
    --gris:#6b7280; --linea:#e5e7eb; --texto:#1f2430;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
       background:#d7dce2;color:var(--texto)}
  header.barra{display:flex;align-items:center;gap:16px;padding:10px 18px;
       background:linear-gradient(90deg,var(--kh),var(--kh2));color:#fff}
  header.barra h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.3px}
  header.barra .estado{margin-left:auto;font-size:13px;display:flex;align-items:center;gap:10px}
  .punto{width:9px;height:9px;border-radius:50%;background:#9ae6b4;display:inline-block}
  .punto.err{background:#feb2b2}
  #mural{display:grid;gap:20px;padding:20px;
       grid-template-columns:repeat(auto-fill,minmax(360px,1fr))}
  .tarjeta{background:#fff;border:1px solid #c3cad3;border-top:4px solid var(--kh);
       border-radius:12px;padding:14px 16px;
       box-shadow:0 4px 12px rgba(0,0,0,.14);display:flex;flex-direction:column;gap:10px}
  /* Cabecera */
  .cab{display:flex;align-items:flex-start;gap:8px}
  .cab .nom{font-size:20px;font-weight:800;line-height:1}
  .cab .cod{font-size:12px;color:var(--gris);font-weight:700;margin-top:4px}
  .cab .badge{margin-left:auto;font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;
       text-transform:uppercase;white-space:nowrap;display:flex;align-items:center;gap:5px}
  .cab .tiempo{font-size:12px;color:var(--gris);margin-left:6px;align-self:flex-start;font-weight:600}
  .b-prod{background:var(--verde-bg);color:var(--verde)}
  .b-prep{background:var(--ambar-bg);color:var(--ambar)}
  .b-paro{background:var(--rojo-bg);color:var(--rojo)}
  .of-linea{display:flex;gap:8px;align-items:center;font-size:12px}
  .of-cod{background:#f3f4f6;border:1px solid var(--linea);border-radius:6px;padding:5px 8px;
       font-weight:700;white-space:nowrap}
  .of-prod{color:var(--kh);font-weight:800;font-size:14px;
       overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .op{display:flex;align-items:center;gap:8px;font-size:13px}
  .op .et{font-size:10px;color:var(--gris);font-weight:700}
  .op .turno{margin-left:auto;font-size:11px;font-weight:700;background:#f3f4f6;
       border:1px solid var(--linea);border-radius:5px;padding:3px 8px}
  .banda-paro{display:flex;align-items:center;gap:10px;background:var(--ambar-bg);
       border-radius:7px;padding:7px 10px;font-size:13px;font-weight:700}
  .banda-paro .tag{background:#fff;border:1px solid var(--ambar);color:var(--ambar);
       font-size:10px;padding:2px 7px;border-radius:5px}
  .banda-paro .t{margin-left:auto;color:var(--ambar)}
  hr{border:none;border-top:1px solid var(--linea);margin:2px 0}
  .seccion-tit{font-size:11px;color:var(--gris);font-weight:800;letter-spacing:.5px}
  /* OEE grande */
  .oee-fila{display:flex;align-items:center;gap:12px}
  .oee-num{font-size:34px;font-weight:800;line-height:1}
  .oee-lab{font-size:11px;color:var(--gris);font-weight:700}
  .barra{flex:1;height:7px;background:#eef0f3;border-radius:4px;overflow:hidden}
  .barra>span{display:block;height:100%}
  /* DRC */
  .drc{display:flex;gap:14px}
  .drc .item{flex:1}
  .drc .et{font-size:10px;color:var(--gris);font-weight:700}
  .drc .v{font-size:16px;font-weight:800}
  .uds{display:flex;gap:6px;font-size:12px;color:var(--gris);flex-wrap:wrap}
  .uds b{color:var(--texto)}
  .uds .uh{margin-left:auto}
  /* reparto */
  .rep-barra{height:8px;border-radius:4px;overflow:hidden;display:flex}
  .rep-barra>span{height:100%}
  .leyenda{display:flex;gap:14px;font-size:11px;flex-wrap:wrap}
  .leyenda i{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:4px}
  /* progreso + cajas */
  .prog{display:flex;align-items:center;gap:10px;font-size:12px}
  .prog .txt{margin-left:auto;font-weight:700}
  .cajas{display:flex;gap:8px}
  .caja{flex:1;border:1px solid var(--linea);border-radius:8px;padding:8px;text-align:center}
  .caja .et{font-size:9px;color:var(--kh);font-weight:800;letter-spacing:.4px}
  .caja .v{font-size:13px;font-weight:700;margin-top:3px}
  .nums{display:flex;gap:8px}
  .num{flex:1;border-radius:8px;padding:8px;text-align:center}
  .num .v{font-size:18px;font-weight:800}
  .num .et{font-size:9px;font-weight:800;letter-spacing:.4px}
  .n-plan{background:#eaf1fb;color:var(--azul)}
  .n-ok{background:var(--verde-bg);color:var(--verde)}
  .n-nok{background:var(--rojo-bg);color:var(--rojo)}
  .n-rwk{background:#fbf3e0;color:var(--ambar)}
  .vacio{padding:40px;text-align:center;color:var(--gris)}
  /* ── Modal de detalle por máquina ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(20,24,32,.55);
       display:none;align-items:flex-start;justify-content:center;z-index:50;padding:30px 16px;overflow:auto}
  .modal-overlay.abierto{display:flex}
  .modal{background:#fff;border-radius:14px;width:min(920px,100%);
       border-top:5px solid var(--kh);box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;position:relative}
  .modal .m-cab{padding:16px 20px;background:#eef6f0}
  .modal .m-nom{font-size:24px;font-weight:800}
  .modal .m-cod{font-size:13px;color:var(--gris);font-weight:700;margin-left:8px}
  .modal .m-of{display:flex;gap:8px;align-items:center;margin-top:8px;font-size:12px}
  .modal .m-of .cod{background:#fff;border:1px solid var(--linea);border-radius:6px;padding:4px 8px;font-weight:700}
  .modal .m-of .prod{color:var(--kh);font-weight:800;font-size:14px}
  .modal .m-tabs{display:flex;gap:22px;align-items:center;padding:0 20px;border-bottom:1px solid var(--linea)}
  .modal .m-tab{padding:12px 2px;font-size:13px;font-weight:700;color:var(--gris);
       background:none;border:none;border-bottom:3px solid transparent;cursor:pointer}
  .modal .m-tab.activa{color:var(--texto);border-bottom-color:var(--kh)}
  .modal .m-actualizar{margin-left:auto;font-size:12px;color:var(--gris);cursor:pointer;background:none;border:none}
  .modal .m-cerrar{position:absolute;top:12px;right:16px;font-size:24px;color:var(--gris);cursor:pointer;background:none;border:none;line-height:1}
  .modal .m-body{padding:18px 20px;min-height:220px}
  .m-tit{font-size:11px;color:var(--gris);font-weight:800;letter-spacing:.5px;margin:4px 0 8px}
  .ritmo-num{font-size:40px;font-weight:800}
  .ritmo-num small{font-size:16px;color:var(--gris);font-weight:600}
  .ritmo-desvio{float:right;color:var(--rojo);font-weight:800}
  .oee3{display:flex;gap:24px;margin-top:6px}
  .oee3 .it{flex:1}
  .oee3 .et{font-size:11px;color:var(--gris)}
  .oee3 .v{font-size:22px;font-weight:800;float:right}
  .fecha-fil{display:flex;gap:8px;align-items:center;margin-bottom:12px;font-size:13px}
  .fecha-fil input{padding:5px 8px;border:1px solid var(--linea);border-radius:6px}
  .fecha-fil .b{padding:5px 10px;border:1px solid var(--linea);border-radius:6px;background:#fff;cursor:pointer;font-size:12px}
  .paro-row{display:grid;grid-template-columns:auto auto auto 1fr auto;gap:14px;align-items:center;
       padding:10px 12px;border:1px solid var(--linea);border-radius:8px;margin-bottom:8px;font-size:13px}
  .paro-row .t{color:var(--gris);font-variant-numeric:tabular-nums}
  .paro-row .of{color:var(--gris);font-size:12px}
  .of-card{border:1px solid var(--linea);border-radius:10px;padding:12px 14px;margin-bottom:10px}
  .of-card .cod{font-weight:800}
  .of-card .prod{color:var(--gris);font-size:13px;margin:4px 0}
  .of-card .nums{font-size:13px}
  .of-card .nums .pl{color:var(--azul);font-weight:700}
  .of-card .nums .ok{color:var(--verde);font-weight:700}
  .of-card .pct{float:right;font-weight:800}
  .m-cargando{color:var(--gris);padding:30px;text-align:center}
</style>
</head>
<body>
<header class="barra">
  <h1>SCADA · Máquinas en producción</h1>
  <div class="estado">
    <span id="punto" class="punto"></span>
    <span id="info">Cargando…</span>
  </div>
</header>
<div id="mural"><div class="vacio">Cargando máquinas…</div></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="m-cerrar" id="mCerrar">×</button>
    <div class="m-cab">
      <div><span class="m-nom" id="mNom"></span><span class="m-cod" id="mCod"></span>
        <span class="badge" id="mBadge" style="margin-left:10px"></span></div>
      <div class="m-of"><span class="cod" id="mOf"></span><span class="prod" id="mProd"></span></div>
    </div>
    <div class="m-tabs">
      <button class="m-tab activa" data-p="resumen">RESUMEN</button>
      <button class="m-tab" data-p="paros">PAROS</button>
      <button class="m-tab" data-p="ofs">OFS</button>
      <button class="m-actualizar" id="mActualizar">↻ Actualizar</button>
    </div>
    <div class="m-body" id="mBody"><div class="m-cargando">Cargando…</div></div>
  </div>
</div>

<script>
const REFRESCO_MS = 12000;
let ultimoOK = null;   // conserva el último mural válido si falla un refresco

const fmt = n => (n===null||n===undefined||n==='') ? '—' : n;
const pct = v => Math.max(0, Math.min(100, Number(v)||0));

// Color de la barra según valor (rojo<50, ámbar<75, verde)
function colorPct(v){ v=Number(v)||0; return v<50?'var(--rojo)':v<75?'var(--ambar)':'var(--verde)'; }

// Clase de badge de estado
function badgeEstado(idAct, estado){
  if (idAct===2 || idAct===20) return 'b-prod';       // PRODUCCION / MEJORAS
  if (idAct===3 || idAct===5)  return 'b-prep';       // PREPARACION / AJUSTES
  return 'b-paro';
}
// "5m", "1h 20m", "33m"
function dur(seg){
  seg=Number(seg)||0; if(seg<=0) return '';
  const d=Math.floor(seg/86400), h=Math.floor(seg%86400/3600), m=Math.floor(seg%3600/60);
  if(d>0) return `${d}d ${h}h`;
  if(h>0) return `${h}h ${m}m`;
  return `${m}m`;
}

function drcBloque(k){
  return `
    <div class="oee-fila">
      <div class="oee-num" style="color:${colorPct(k.oee)}">${fmt(k.oee)}</div>
      <div><div class="oee-lab">OEE</div>
        <div class="barra"><span style="width:${pct(k.oee)}%;background:${colorPct(k.oee)}"></span></div></div>
    </div>
    <div class="drc">
      ${['disp','rend','cal'].map(c=>{
        const lab={disp:'DISP',rend:'REND',cal:'CAL'}[c];
        return `<div class="item"><div class="et">${lab}</div>
          <div class="v" style="color:${colorPct(k[c])}">${fmt(k[c])}%</div>
          <div class="barra"><span style="width:${pct(k[c])}%;background:${colorPct(k[c])}"></span></div></div>`;
      }).join('')}
    </div>`;
}

function tarjeta(m){
  const t=m.turno_kpi, o=m.of_kpi;
  const enParo = m.paro && m.paro.motivo;
  const bandaParo = enParo ? `
    <div class="banda-paro"><span class="tag">EN PARO</span>${m.paro.motivo}
      <span class="t">${dur(m.paro.seg)}</span></div>` : '';
  return `
  <div class="tarjeta" data-cod="${m.cod_maquina}" style="cursor:pointer">
    <div class="cab">
      <div><div class="nom">${m.desc_maquina}</div><div class="cod">${m.cod_maquina}</div></div>
      <span class="badge ${badgeEstado(m.id_actividad,m.estado)}">${m.estado}</span>
      <span class="tiempo">${dur(m.paro&&m.paro.seg?m.paro.seg:0)}</span>
    </div>
    <div class="of-linea">
      <span class="of-cod">${fmt(m.of)}</span>
      <span class="of-prod" title="${m.producto||''}">${fmt(m.producto)}</span>
    </div>
    <div class="op"><span class="et">OP</span>${fmt(m.operario)}
      <span class="turno">${fmt(m.turno)}</span></div>
    ${bandaParo}
    <hr>
    <div class="seccion-tit">MÉTRICAS DE TURNO</div>
    ${drcBloque(t)}
    <div class="uds">OK <b>${t.ok}</b> · RWK <b>${t.rwk}</b> &nbsp; NOK <b>${t.nok}</b>
      <span class="uh">${t.uh} u/h</span></div>
    <div class="rep-barra">
      <span style="width:${t.rep_prod}%;background:var(--verde)"></span>
      <span style="width:${t.rep_prep}%;background:var(--azul)"></span>
      <span style="width:${t.rep_paro}%;background:var(--rojo)"></span>
    </div>
    <div class="leyenda">
      <span><i style="background:var(--verde)"></i>Producción ${t.rep_prod}%</span>
      <span><i style="background:var(--azul)"></i>Preparación ${t.rep_prep}%</span>
      <span><i style="background:var(--rojo)"></i>Paro ${t.rep_paro}%</span>
    </div>
    <hr>
    <div class="seccion-tit">MÉTRICAS DE OF</div>
    ${drcBloque(o)}
    <div class="prog"><span>Progreso de la orden</span>
      <span class="txt">${o.ok} / ${o.plan} · ${o.progreso_pct}%</span></div>
    <div class="barra"><span style="width:${pct(o.progreso_pct)}%;background:${colorPct(o.progreso_pct)}"></span></div>
    <div class="cajas">
      <div class="caja"><div class="et">INICIO</div><div class="v">${fmt(o.inicio)}</div></div>
      <div class="caja"><div class="et">FIN EST.</div><div class="v">${fmt(o.fin_est)}</div></div>
      <div class="caja"><div class="et">RESTANTE</div><div class="v">${fmt(o.restante)}</div></div>
    </div>
    <div class="nums">
      <div class="num n-plan"><div class="v">${o.plan}</div><div class="et">PLAN</div></div>
      <div class="num n-ok"><div class="v">${o.ok}</div><div class="et">OK</div></div>
      <div class="num n-nok"><div class="v">${o.nok}</div><div class="et">NOK</div></div>
      <div class="num n-rwk"><div class="v">${o.rwk}</div><div class="et">RWK</div></div>
    </div>
  </div>`;
}

function pinta(data){
  const mural=document.getElementById('mural');
  if(!data.maquinas || !data.maquinas.length){
    mural.innerHTML='<div class="vacio">No hay máquinas en producción ahora mismo.</div>';
    return;
  }
  mural.innerHTML = data.maquinas.map(tarjeta).join('');
  window._ultimoMural = data.maquinas;   // para localizar la máquina al clicar
}

async function cargar(){
  const punto=document.getElementById('punto'), info=document.getElementById('info');
  try{
    const r = await fetch('api/scada_mural.php', {cache:'no-store'});
    const j = await r.json();
    if(!j.ok) throw new Error(j.error||'respuesta no OK');
    ultimoOK = j.data;
    pinta(j.data);
    punto.className='punto';
    info.textContent = `${j.data.maquinas.length} máquinas · actualizado ${new Date().toLocaleTimeString('es-ES')}`;
  }catch(e){
    punto.className='punto err';
    info.textContent = 'Sin conexión con MAPEX · mostrando último dato';
    if(ultimoOK) pinta(ultimoOK);   // no vaciar el mural ante un fallo puntual
  }
}

// ───────── Modal de detalle por máquina ─────────
let modalMaq = null, modalPestana = 'resumen', fechaModal = null;

function hoyISO(){ return new Date().toISOString().slice(0,10); }
function dmy(iso){ const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function durSeg(s){ s=Number(s)||0; const h=Math.floor(s/3600), m=Math.floor(s%3600/60), x=s%60;
  return h>0?`${h}h ${m}m`:(m>0?`${m}m ${x<10?'0':''}${x}s`:`${x}s`); }
function barra(v,color){ return `<div class="barra"><span style="width:${pct(v)}%;background:${color||colorPct(v)}"></span></div>`; }

function abrirModal(m){
  modalMaq = m; modalPestana = 'resumen'; fechaModal = hoyISO();
  document.getElementById('mNom').textContent = m.desc_maquina;
  document.getElementById('mCod').textContent = m.cod_maquina;
  const b = document.getElementById('mBadge');
  b.className = 'badge ' + badgeEstado(m.id_actividad, m.estado); b.textContent = m.estado;
  document.getElementById('mOf').textContent = m.of;
  document.getElementById('mProd').textContent = m.producto;
  document.querySelectorAll('.m-tab').forEach(t=>t.classList.toggle('activa', t.dataset.p==='resumen'));
  document.getElementById('modalOverlay').classList.add('abierto');
  cargarPestana('resumen');
}
function cerrarModal(){ document.getElementById('modalOverlay').classList.remove('abierto'); }

async function cargarPestana(nombre){
  modalPestana = nombre;
  const body = document.getElementById('mBody');
  body.innerHTML = '<div class="m-cargando">Cargando…</div>';
  try{
    if(nombre==='resumen'){
      const r = await fetch(`api/scada_maquina_resumen.php?cod=${encodeURIComponent(modalMaq.cod_maquina)}`,{cache:'no-store'});
      const j = await r.json(); if(!j.ok) throw 0; body.innerHTML = renderResumen(j.data);
    } else {
      renderFiltroFecha(body, nombre);
    }
  }catch(e){ body.innerHTML = '<div class="m-cargando">No se pudieron cargar los datos.</div>'; }
}

function renderResumen(d){
  const desvioTxt = d.ritmo.desvio<0 ? `${d.ritmo.desvio} bajo el ritmo`
                   : d.ritmo.desvio>0 ? `+${d.ritmo.desvio} sobre el ritmo` : 'en ritmo';
  return `
    <div class="m-tit">RITMO DEL TURNO · REAL vs TEÓRICO</div>
    <div><span class="ritmo-num">${d.ritmo.real}<small> / ${d.ritmo.teorico} esperadas</small></span>
      <span class="ritmo-desvio">${desvioTxt}</span></div>
    ${barra(d.ritmo.teorico?Math.min(100,d.ritmo.real*100/d.ritmo.teorico):0,'var(--rojo)')}
    <div class="m-tit" style="margin-top:18px">OEE</div>
    <div class="oee3">
      <div class="it"><span class="v" style="color:${colorPct(d.oee.turno)}">${d.oee.turno}%</span><div class="et">Turno</div>${barra(d.oee.turno)}</div>
      <div class="it"><span class="v" style="color:${colorPct(d.oee.of)}">${d.oee.of}%</span><div class="et">OF</div>${barra(d.oee.of)}</div>
      <div class="it"><span class="v" style="color:${colorPct(d.oee.rend_turno)}">${d.oee.rend_turno}%</span><div class="et">Rend. turno</div>${barra(d.oee.rend_turno)}</div>
    </div>
    <div class="m-tit" style="margin-top:18px">ORDEN EN CURSO</div>
    <div><span class="ritmo-num" style="font-size:28px">${d.orden.ok} / ${d.orden.plan}</span>
      <small style="color:var(--gris)"> · ${d.orden.pct}%</small>
      <span class="ritmo-desvio" style="color:var(--ambar)">faltan ${d.orden.faltan}</span></div>
    ${barra(d.orden.pct)}
    <div style="margin-top:10px;font-size:13px">
      <span style="color:var(--verde);font-weight:700">OK ${d.unidades.ok}</span> &nbsp;
      NOK ${d.unidades.nok} &nbsp; RWK ${d.unidades.rwk}</div>`;
}

function renderFiltroFecha(body, pestana){
  if(!fechaModal) fechaModal = hoyISO();
  body.innerHTML = `
    <div class="fecha-fil">
      <span>Fecha:</span>
      <input type="date" id="mFecha" value="${fechaModal}">
      <button class="b" data-r="hoy">Hoy</button>
      <button class="b" data-r="ayer">Ayer</button>
      <button class="b" data-r="7dias">7 días</button>
    </div>
    <div id="mLista"><div class="m-cargando">Cargando…</div></div>`;
  const recargar = (dias=1)=> pestana==='paros' ? cargarParos(dias) : cargarOfs();
  body.querySelector('#mFecha').addEventListener('change', e=>{ fechaModal=e.target.value; recargar(); });
  body.querySelectorAll('.b').forEach(b=>b.addEventListener('click', ()=>{
    const r=b.dataset.r;
    if(r==='hoy'){ fechaModal=hoyISO(); recargar(1); }
    else if(r==='ayer'){ const d=new Date(); d.setDate(d.getDate()-1); fechaModal=d.toISOString().slice(0,10); recargar(1); }
    else { fechaModal=hoyISO(); recargar(7); }
    body.querySelector('#mFecha').value = fechaModal;
  }));
  recargar();
}

async function cargarParos(dias=1){
  const cont = document.getElementById('mLista');
  cont.innerHTML='<div class="m-cargando">Cargando…</div>';
  try{
    const r=await fetch(`api/scada_maquina_paros.php?cod=${encodeURIComponent(modalMaq.cod_maquina)}&fecha=${fechaModal}&dias=${dias}`,{cache:'no-store'});
    const j=await r.json(); if(!j.ok) throw 0; const d=j.data;
    if(!d.paros.length){ cont.innerHTML='<div class="m-cargando">Sin paros en el periodo.</div>'; return; }
    cont.innerHTML = `<div class="m-tit">PAROS DEL DÍA · ${dmy(d.fecha)} · ${durSeg(d.total_seg)} EN TOTAL</div>` +
      d.paros.map(p=>`<div class="paro-row"><span class="t">${p.ini}</span><span class="t">${p.fin}</span>
        <span class="t"><b>${durSeg(p.seg)}</b></span><span>${p.motivo}</span><span class="of">${p.of}</span></div>`).join('');
  }catch(e){ cont.innerHTML='<div class="m-cargando">No se pudieron cargar los paros.</div>'; }
}

async function cargarOfs(){
  const cont = document.getElementById('mLista');
  cont.innerHTML='<div class="m-cargando">Cargando…</div>';
  try{
    const r=await fetch(`api/scada_maquina_ofs.php?cod=${encodeURIComponent(modalMaq.cod_maquina)}&fecha=${fechaModal}`,{cache:'no-store'});
    const j=await r.json(); if(!j.ok) throw 0; const d=j.data;
    if(!d.ofs.length){ cont.innerHTML='<div class="m-cargando">Sin OFs en el día.</div>'; return; }
    cont.innerHTML = `<div class="m-tit">OFS DEL DÍA · ${dmy(d.fecha)}</div>` +
      d.ofs.map(o=>`<div class="of-card"><span class="pct" style="color:${colorPct(o.pct)}">${o.pct}%</span>
        <div class="cod">${o.of}</div><div class="prod">${o.producto}</div>
        <div class="nums"><span class="pl">PLAN ${o.plan}</span> <span class="ok">OK ${o.ok}</span> RWK ${o.rwk}</div>
        ${barra(o.pct)}</div>`).join('');
  }catch(e){ cont.innerHTML='<div class="m-cargando">No se pudieron cargar las OFs.</div>'; }
}

document.getElementById('mural').addEventListener('click', e=>{
  const t = e.target.closest('.tarjeta'); if(!t) return;
  const m = (window._ultimoMural||[]).find(x=>x.cod_maquina===t.dataset.cod);
  if(m) abrirModal(m);
});
document.getElementById('mCerrar').addEventListener('click', cerrarModal);
document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target.id==='modalOverlay') cerrarModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') cerrarModal(); });
document.querySelectorAll('.m-tab').forEach(t=>t.addEventListener('click', ()=>{
  document.querySelectorAll('.m-tab').forEach(x=>x.classList.remove('activa'));
  t.classList.add('activa'); cargarPestana(t.dataset.p);
}));
document.getElementById('mActualizar').addEventListener('click', ()=>cargarPestana(modalPestana));

cargar();
setInterval(cargar, REFRESCO_MS);
</script>
