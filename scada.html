<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="assets/img/kh.ico">
<title>SCADA · Máquinas en producción</title>
<style>
  :root{
    --kh:#8c181a; --kh2:#a52225;
    --verde:#2e9e5b; --verde-bg:#e8f5ec;
    --ambar:#d99000; --ambar-bg:#fbf3e0;
    --rojo:#d23b3b;  --rojo-bg:#fbe9e9;
    --azul:#3b7fd2;
    --gris:#6b7280; --linea:#e5e7eb; --texto:#1f2430;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
       background:#d7dce2;color:var(--texto)}
  /* Sombra corporativa rojiza fija en los bordes de la ventana (indica que hay
     más contenido al hacer scroll). No intercepta clics (pointer-events:none). */
  .scroll-sombra{position:fixed;left:0;right:0;height:40px;z-index:50;pointer-events:none}
  .scroll-sombra.top{top:0;background:linear-gradient(to bottom,rgba(140,24,26,.18),rgba(140,24,26,0))}
  .scroll-sombra.bot{bottom:0;background:linear-gradient(to top,rgba(140,24,26,.18),rgba(140,24,26,0))}
  header.barra{display:flex;align-items:center;gap:16px;padding:10px 18px;
       background:linear-gradient(90deg,var(--kh),var(--kh2));color:#fff}
  header.barra .barra-logo{height:30px;width:auto;background:#fff;border-radius:6px;padding:3px 6px}
  header.barra h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.3px}
  header.barra .estado{margin-left:auto;font-size:13px;display:flex;align-items:center;gap:10px}
  .punto{width:9px;height:9px;border-radius:50%;background:#9ae6b4;display:inline-block}
  .punto.err{background:#feb2b2}
  #mural{display:grid;gap:20px;padding:20px;
       grid-template-columns:repeat(auto-fill,minmax(360px,1fr))}
  .tarjeta{background:#fff;border:1px solid #c3cad3;border-top:4px solid var(--kh);
       border-radius:12px;padding:14px 16px;
       box-shadow:0 4px 12px rgba(0,0,0,.14);display:flex;flex-direction:column;gap:10px}
  /* Cabecera */
  .cab{display:flex;align-items:flex-start;gap:8px}
  .cab .nom{font-size:20px;font-weight:800;line-height:1}
  .cab .cod{font-size:12px;color:var(--gris);font-weight:700;margin-top:4px}
  .cab .badge{margin-left:auto;font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;
       text-transform:uppercase;white-space:nowrap;display:flex;align-items:center;gap:5px}
  .cab .tiempo{font-size:12px;color:var(--gris);margin-left:6px;align-self:flex-start;font-weight:600}
  .b-prod{background:var(--verde-bg);color:var(--verde)}
  .b-prep{background:var(--ambar-bg);color:var(--ambar)}
  .b-paro{background:var(--rojo-bg);color:var(--rojo)}
  .of-linea{display:flex;gap:8px;align-items:center;font-size:12px}
  .of-cod{background:#f3f4f6;border:1px solid var(--linea);border-radius:6px;padding:5px 8px;
       font-weight:700;white-space:nowrap}
  .of-prod{color:var(--kh);font-weight:800;font-size:14px;
       overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .op{display:flex;align-items:center;gap:8px;font-size:13px}
  .op .et{font-size:10px;color:var(--gris);font-weight:700}
  .op .turno{margin-left:auto;font-size:11px;font-weight:700;background:#f3f4f6;
       border:1px solid var(--linea);border-radius:5px;padding:3px 8px}
  .banda-paro{display:flex;align-items:center;gap:10px;background:var(--ambar-bg);
       border-radius:7px;padding:7px 10px;font-size:13px;font-weight:700}
  .banda-paro .tag{background:#fff;border:1px solid var(--ambar);color:var(--ambar);
       font-size:10px;padding:2px 7px;border-radius:5px;flex:none;align-self:flex-start;margin-top:2px}
  .banda-paro .bp-info{display:flex;flex-direction:column;gap:1px;min-width:0}
  .banda-paro .bp-cat{font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;opacity:.85}
  .banda-paro .bp-motivo{font-size:15px;font-weight:800;color:#1f2430;line-height:1.15}
  .banda-paro .t{margin-left:auto;color:var(--ambar);flex:none;align-self:flex-start;margin-top:2px}
  hr{border:none;border-top:1px solid var(--linea);margin:2px 0}
  .seccion-tit{font-size:11px;color:var(--gris);font-weight:800;letter-spacing:.5px}
  /* OEE grande */
  .oee-fila{display:flex;align-items:center;gap:12px}
  .oee-num{font-size:34px;font-weight:800;line-height:1}
  .oee-lab{font-size:11px;color:var(--gris);font-weight:700}
  .barra{flex:1;height:7px;background:#eef0f3;border-radius:4px;overflow:hidden}
  .barra>span{display:block;height:100%}
  /* DRC */
  .drc{display:flex;gap:14px}
  .drc .item{flex:1}
  .drc .et{font-size:10px;color:var(--gris);font-weight:700}
  .drc .v{font-size:16px;font-weight:800}
  .uds{display:flex;gap:6px;font-size:12px;color:var(--gris);flex-wrap:wrap}
  .uds b{color:var(--texto)}
  .uds .uh{margin-left:auto}
  /* reparto */
  .rep-barra{height:8px;border-radius:4px;overflow:hidden;display:flex}
  .rep-barra>span{height:100%}
  .leyenda{display:flex;gap:14px;font-size:11px;flex-wrap:wrap}
  .leyenda i{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:4px}
  /* progreso + cajas */
  .prog{display:flex;align-items:center;gap:10px;font-size:12px}
  .prog .txt{margin-left:auto;font-weight:700}
  .cajas{display:flex;gap:8px}
  .caja{flex:1;border:1px solid var(--linea);border-radius:8px;padding:8px;text-align:center}
  .caja .et{font-size:9px;color:var(--kh);font-weight:800;letter-spacing:.4px}
  .caja .v{font-size:13px;font-weight:700;margin-top:3px}
  .nums{display:flex;gap:8px}
  .num{flex:1;border-radius:8px;padding:8px;text-align:center}
  .num .v{font-size:18px;font-weight:800}
  .num .et{font-size:9px;font-weight:800;letter-spacing:.4px}
  .n-plan{background:#eaf1fb;color:var(--azul)}
  .n-ok{background:var(--verde-bg);color:var(--verde)}
  .n-nok{background:var(--rojo-bg);color:var(--rojo)}
  .n-rwk{background:#fbf3e0;color:var(--ambar)}
  .vacio{padding:40px;text-align:center;color:var(--gris)}
  /* ── Modal de detalle por máquina ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(20,24,32,.55);
       display:none;align-items:flex-start;justify-content:center;z-index:50;padding:30px 16px;overflow:auto}
  .modal-overlay.abierto{display:flex}
  .modal{background:#fff;border-radius:14px;width:min(920px,100%);
       border-top:5px solid var(--kh);box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;position:relative}
  .modal .m-cab{padding:16px 20px;background:#eef6f0}
  .modal .m-nom{font-size:24px;font-weight:800}
  .modal .m-cod{font-size:13px;color:var(--gris);font-weight:700;margin-left:8px}
  .modal .m-of{display:flex;gap:8px;align-items:center;margin-top:8px;font-size:12px}
  .modal .m-of .cod{background:#fff;border:1px solid var(--linea);border-radius:6px;padding:4px 8px;font-weight:700}
  .modal .m-of .prod{color:var(--kh);font-weight:800;font-size:14px}
  .modal .m-tabs{display:flex;gap:22px;align-items:center;padding:0 20px;border-bottom:1px solid var(--linea)}
  .modal .m-tab{padding:12px 2px;font-size:13px;font-weight:700;color:var(--gris);
       background:none;border:none;border-bottom:3px solid transparent;cursor:pointer}
  .modal .m-tab.activa{color:var(--texto);border-bottom-color:var(--kh)}
  .modal .m-actualizar{margin-left:auto;font-size:12px;color:var(--gris);cursor:pointer;background:none;border:none}
  .modal .m-cerrar{position:absolute;top:12px;right:16px;font-size:24px;color:var(--gris);cursor:pointer;background:none;border:none;line-height:1}
  .modal .m-body{padding:18px 20px;min-height:220px}
  .m-tit{font-size:11px;color:var(--gris);font-weight:800;letter-spacing:.5px;margin:4px 0 8px}
  .ritmo-num{font-size:40px;font-weight:800}
  .ritmo-num small{font-size:16px;color:var(--gris);font-weight:600}
  .ritmo-desvio{float:right;color:var(--rojo);font-weight:800}
  .oee3{display:flex;gap:24px;margin-top:6px}
  .oee3 .it{flex:1}
  .oee3 .et{font-size:11px;color:var(--gris)}
  .oee3 .v{font-size:22px;font-weight:800;float:right}
  .fecha-fil{display:flex;gap:8px;align-items:center;margin-bottom:12px;font-size:13px}
  .fecha-fil input{padding:5px 8px;border:1px solid var(--linea);border-radius:6px}
  .fecha-fil .b{padding:5px 10px;border:1px solid var(--linea);border-radius:6px;background:#fff;cursor:pointer;font-size:12px}
  .fecha-fil .b.activa{background:var(--kh);color:#fff;border-color:var(--kh)}
  .t-turnos{width:100%;border-collapse:collapse;font-size:13px}
  .t-turnos th{text-align:right;padding:7px 10px;font-size:11px;color:var(--gris);font-weight:700;
       text-transform:uppercase;border-bottom:2px solid var(--linea)}
  .t-turnos th:first-child,.t-turnos th:nth-child(2){text-align:left}
  .t-turnos td{text-align:right;padding:8px 10px;border-bottom:1px solid var(--linea);font-variant-numeric:tabular-nums}
  .t-turnos td:first-child,.t-turnos td:nth-child(2){text-align:left}
  .t-turnos tbody tr:hover{background:#faf5f5}
  .paro-row{display:grid;grid-template-columns:auto auto auto 1fr auto;gap:14px;align-items:center;
       padding:10px 12px;border:1px solid var(--linea);border-radius:8px;margin-bottom:8px;font-size:13px}
  .paro-row .t{color:var(--gris);font-variant-numeric:tabular-nums}
  .paro-row .of{color:var(--gris);font-size:12px}
  .of-card{border:1px solid var(--linea);border-radius:10px;padding:12px 14px;margin-bottom:10px}
  .of-card .cod{font-weight:800}
  .of-card .prod{color:var(--gris);font-size:13px;margin:4px 0}
  .of-card .nums{font-size:13px}
  .of-card .nums .pl{color:var(--azul);font-weight:700}
  .of-card .nums .ok{color:var(--verde);font-weight:700}
  .of-card .pct{float:right;font-weight:800}
  .m-cargando{color:var(--gris);padding:30px;text-align:center}
  /* ── Barra de menú SCADA ── */
  .menu-scada{background:#fff;border-bottom:1px solid var(--linea);padding:8px 16px;display:flex;flex-direction:column;gap:8px}
  .ms-fila{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .ms-cont{display:flex;gap:8px}
  .ms-cont .c{border:1px solid var(--linea);border-radius:16px;padding:4px 10px;font-size:12px;cursor:pointer;font-weight:700}
  .ms-cont .c.on{background:#8c181a;color:#fff;border-color:#8c181a}
  .ms-cont .c b{font-size:14px;margin-right:4px}
  .ms-dens{margin-left:auto;display:flex;gap:4px}
  .ms-dens button,.ms-orden button,.ms-tog{font-size:12px;font-weight:600;padding:5px 10px;border:1px solid var(--linea);border-radius:6px;background:#fff;cursor:pointer;color:#374151}
  .ms-dens button.on,.ms-orden button.on,.ms-tog.on{background:#8c181a;border-color:#8c181a;color:#fff}
  .ms-zoom{display:flex;align-items:center;gap:4px;font-size:12px}
  .ms-zoom button{width:24px;height:24px;border:1px solid var(--linea);border-radius:4px;background:#fff;cursor:pointer}
  .ms-orden{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-left:auto}
  .ms-orden-lbl{font-size:10px;color:var(--gris);font-weight:800;margin-right:4px}
  /* densidades */
  #mural{--fz:1}
  /* Compacta: cajas medianas (más grandes que antes) */
  #mural.dens-compacta{grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .tarjeta.compacta{gap:8px;padding:16px 18px}
  .tarjeta.compacta .nom{font-size:calc(24px * var(--fz))}
  .tarjeta.compacta .c-ref,.tarjeta.compacta .c-est{font-size:14px}
  .tarjeta.compacta .et{font-size:10px;color:var(--gris);font-weight:800;letter-spacing:.4px}
  .tarjeta.compacta .c-paro{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;
       border-radius:6px;padding:6px 8px;margin-top:2px}
  .tarjeta.compacta .c-paro-info{display:flex;flex-direction:column;gap:1px;min-width:0}
  .tarjeta.compacta .c-paro-cat{font-size:10px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;opacity:.85}
  .tarjeta.compacta .c-paro-motivo{font-size:14px;font-weight:800;color:#1f2430;line-height:1.15}
  .tarjeta.compacta .c-paro-t{margin-left:auto;font-weight:700;color:var(--gris);flex:none;align-self:flex-start;margin-top:2px}
  /* Cómoda: tarjeta completa MÁS grande y espaciada (se distingue de Normal) */
  #mural.dens-comoda{grid-template-columns:repeat(auto-fill,minmax(460px,1fr));gap:26px}
  #mural.dens-comoda .tarjeta{padding:20px 24px;gap:14px}
  #mural.dens-comoda .nom{font-size:calc(26px * var(--fz))}
  #mural.dens-comoda .oee-num{font-size:42px}
  #mural.dens-comoda .seccion-tit{font-size:12px}
  #mural.dens-comoda .drc .v{font-size:19px}
  #mural.dens-comoda .num .v{font-size:22px}
  .tarjeta .nom{font-size:calc(20px * var(--fz))}
  .t-ocultar{margin-left:auto;background:none;border:none;color:var(--gris);cursor:pointer;font-size:14px;line-height:1}
</style>
</head>
<body>
<div class="scroll-sombra top"></div>
<div class="scroll-sombra bot"></div>
<header class="barra">
  <img src="assets/img/logo-kh.png" alt="KH" class="barra-logo">
  <h1>SCADA · Máquinas en producción</h1>
  <div class="estado">
    <span id="punto" class="punto"></span>
    <span id="info">Cargando…</span>
  </div>
</header>
<div class="menu-scada">
  <div class="ms-fila">
    <div class="ms-cont" id="msContadores"></div>
    <div class="ms-dens">
      <button data-d="comoda">Cómoda</button>
      <button data-d="normal" class="on">Normal</button>
      <button data-d="compacta">Compacta</button>
    </div>
    <div class="ms-zoom">
      <button data-z="-">−</button><span id="msZoomV">100%</span><button data-z="+">+</button>
      &nbsp;<b>A</b><button data-f="-">−</button><span id="msFzV">100%</span><button data-f="+">+</button>
    </div>
  </div>
  <div class="ms-fila">
    <button class="ms-tog" id="msProblemas">● Solo problemas <b id="msProbN">0</b></button>
    <button class="ms-tog" id="msOcultas">👁 Ocultas <b id="msOcN">0</b></button>
    <div class="ms-orden" id="msOrden">
      <span class="ms-orden-lbl">ORDEN</span>
      <button data-o="urgencia">Urgencia</button>
      <button data-o="oee">OEE bajo primero</button>
      <button data-o="restante">Tiempo restante OF</button>
      <button data-o="prep">Preparación primero</button>
      <button data-o="prod" class="on">Producción primero</button>
      <button data-o="codigo">Código A-Z</button>
      <button data-o="motivo">Motivo de paro</button>
      <button data-o="finest">FIN EST. OF</button>
      <button data-o="tiempoparo">Tiempo de paro</button>
    </div>
  </div>
</div>
<div id="mural"><div class="vacio">Cargando máquinas…</div></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="m-cerrar" id="mCerrar">×</button>
    <div class="m-cab">
      <div><span class="m-nom" id="mNom"></span><span class="m-cod" id="mCod"></span>
        <span class="badge" id="mBadge" style="margin-left:10px"></span></div>
      <div class="m-of"><span class="cod" id="mOf"></span><span class="prod" id="mProd"></span></div>
    </div>
    <div class="m-tabs">
      <button class="m-tab activa" data-p="resumen">RESUMEN</button>
      <button class="m-tab" data-p="paros">PAROS</button>
      <button class="m-tab" data-p="ofs">OFS</button>
      <button class="m-tab" data-p="turnos">TURNOS</button>
      <button class="m-actualizar" id="mActualizar">↻ Actualizar</button>
    </div>
    <div class="m-body" id="mBody"><div class="m-cargando">Cargando…</div></div>
  </div>
</div>

<script>
const REFRESCO_MS = 12000;
let ultimoOK = null;   // conserva el último mural válido si falla un refresco

const fmt = n => (n===null||n===undefined||n==='') ? '—' : n;
const pct = v => Math.max(0, Math.min(100, Number(v)||0));

// Color de la barra según valor (rojo<50, ámbar<75, verde)
function colorPct(v){ v=Number(v)||0; return v<50?'var(--rojo)':v<75?'var(--ambar)':'var(--verde)'; }

// Clase de badge de estado
function badgeEstado(idAct, estado){
  if (idAct===2 || idAct===20) return 'b-prod';       // PRODUCCION / MEJORAS
  if (idAct===3 || idAct===5)  return 'b-prep';       // PREPARACION / AJUSTES
  return 'b-paro';
}
// "5m", "1h 20m", "33m"
function dur(seg){
  seg=Number(seg)||0; if(seg<=0) return '';
  const d=Math.floor(seg/86400), h=Math.floor(seg%86400/3600), m=Math.floor(seg%3600/60);
  if(d>0) return `${d}d ${h}h`;
  if(h>0) return `${h}h ${m}m`;
  return `${m}m`;
}

function drcBloque(k){
  return `
    <div class="oee-fila">
      <div class="oee-num" style="color:${colorPct(k.oee)}">${fmt(k.oee)}</div>
      <div><div class="oee-lab">OEE</div>
        <div class="barra"><span style="width:${pct(k.oee)}%;background:${colorPct(k.oee)}"></span></div></div>
    </div>
    <div class="drc">
      ${['disp','rend','cal'].map(c=>{
        const lab={disp:'DISP',rend:'REND',cal:'CAL'}[c];
        return `<div class="item"><div class="et">${lab}</div>
          <div class="v" style="color:${colorPct(k[c])}">${fmt(k[c])}%</div>
          <div class="barra"><span style="width:${pct(k[c])}%;background:${colorPct(k[c])}"></span></div></div>`;
      }).join('')}
    </div>`;
}

// Paleta de categorías de paro (nivel Matriz2) para colorear la banda de paro.
const CAT_PARO_COL={'Mantenimiento':'#8c181a','Calidad':'#b5179e','Cambio MP/Utillajes':'#d99000','Ajustes y Programacion':'#3b7fd2','Esperas':'#6b7280','Interrupciones':'#c9a227','Mejoras':'#2e9e5b'};
function tarjeta(m){
  const t=m.turno_kpi, o=m.of_kpi;
  const enParo = m.paro && m.paro.motivo;
  const cCol=CAT_PARO_COL[m.paro_categoria]||'#d99000';
  const bandaParo = enParo ? `
    <div class="banda-paro" style="background:${cCol}22;border-left:4px solid ${cCol}">
      <span class="tag" style="border-color:${cCol};color:${cCol}">EN PARO</span>
      <span class="bp-info">
        ${m.paro_categoria?`<span class="bp-cat" style="color:${cCol}">${m.paro_categoria}</span>`:''}
        <span class="bp-motivo">${m.paro.motivo}</span>
      </span>
      <span class="t">${dur(m.paro.seg)}</span></div>` : '';
  // Máquina parada: fondo con tinte corporativo muy tenue (rgba #8c181a al 4%),
  // apenas perceptible pero distingue la parada del blanco; total legibilidad.
  const bgParada = m.estado_cat==='parada' ? 'background:rgba(140,24,26,.04);' : '';
  return `
  <div class="tarjeta" data-cod="${m.cod_maquina}" style="cursor:pointer;${bgParada}">
    <div class="cab">
      <div><div class="nom">${m.desc_maquina}</div><div class="cod">${m.cod_maquina}</div></div>
      <span class="badge ${badgeEstado(m.id_actividad,m.estado)}">${m.estado}</span>
      <span class="tiempo">${dur(m.paro&&m.paro.seg?m.paro.seg:0)}</span>
      <button class="t-ocultar" data-ocultar="${m.cod_maquina}" title="Ocultar" onclick="event.stopPropagation()">✕</button>
    </div>
    <div class="of-linea">
      <span class="of-cod">${fmt(m.of)}</span>
      <span class="of-prod" title="${m.producto||''}">${fmt(m.producto)}</span>
    </div>
    <div class="op"><span class="et">OP</span>${fmt(m.operario)}
      <span class="turno">${fmt(m.turno)}</span></div>
    ${bandaParo}
    <hr>
    <div class="seccion-tit">MÉTRICAS DE TURNO</div>
    ${drcBloque(t)}

const PREF_KEY='scada_prefs';
const State=Object.assign(
  {densidad:'normal',orden:'prod',zoom:100,fz:100,soloProblemas:false,filtroEstado:null,ocultas:[],verCerradas:false},
  JSON.parse(localStorage.getItem(PREF_KEY)||'{}'));
function guardarPrefs(){localStorage.setItem(PREF_KEY,JSON.stringify(State));}

function renderContadores(c){
  const defs=[['total','Máquinas',null],['produccion','Producción','#2e9e5b'],['preparacion','Preparación','#3b7fd2'],['parada','Paradas','#d23b3b'],['cerrada','Cerradas','#6b7280']];
  const est={total:null,produccion:'produccion',preparacion:'preparacion',parada:'parada',cerrada:'cerrada'};
  // "Cerradas" NO filtra: es un toggle mostrar/ocultar (por defecto ocultas).
  const activo=k=> k==='cerrada' ? State.verCerradas : State.filtroEstado===est[k];
  document.getElementById('msContadores').innerHTML=defs.map(([k,lbl,col])=>{
    // "Cerradas" lleva prefijo Ver/Ocultar según estén ocultas o visibles.
    const texto = k==='cerrada' ? `${State.verCerradas?'Ocultar':'Ver'} ${lbl}` : lbl;
    return `<span class="c ${activo(k)?'on':''}" data-k="${k}" data-est="${est[k]||''}" title="${k==='cerrada'?'Mostrar/ocultar máquinas cerradas':'Filtrar por estado'}"><b style="${col?'color:'+col:''}">${c[k]||0}</b>${texto}</span>`;
  }).join('');
  document.querySelectorAll('.ms-cont .c').forEach(el=>el.onclick=()=>{
    if(el.dataset.k==='cerrada'){ State.verCerradas=!State.verCerradas; guardarPrefs(); aplicarMenu(); return; }
    const e=el.dataset.est||null; State.filtroEstado=(State.filtroEstado===e?null:e); guardarPrefs(); aplicarMenu();
  });
}
function aplicarZoom(){
  const m=document.getElementById('mural');
  m.style.zoom=State.zoom/100; m.style.setProperty('--fz',State.fz/100);

function wireMenu(){
  document.querySelectorAll('.ms-dens button').forEach(b=>b.onclick=()=>{State.densidad=b.dataset.d;guardarPrefs();aplicarMenu();});
  document.querySelectorAll('.ms-orden button').forEach(b=>b.onclick=()=>{State.orden=b.dataset.o;guardarPrefs();aplicarMenu();});
  document.getElementById('msProblemas').onclick=()=>{State.soloProblemas=!State.soloProblemas;guardarPrefs();aplicarMenu();};
  document.getElementById('msOcultas').onclick=()=>{State.ocultas=[];guardarPrefs();aplicarMenu();};
  document.querySelectorAll('[data-z]').forEach(b=>b.onclick=()=>{State.zoom=Math.max(50,Math.min(150,State.zoom+(b.dataset.z==='+'?10:-10)));guardarPrefs();aplicarZoom();});
  document.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{State.fz=Math.max(70,Math.min(160,State.fz+(b.dataset.f==='+'?10:-10)));guardarPrefs();aplicarZoom();});
}

// Parsers para ordenar
function parseMin(t){ if(!t||t==='—'||t==='Completada') return Infinity;
  let m=0; const d=/(\d+)d/.exec(t),h=/(\d+)h/.exec(t),mi=/(\d+)m/.exec(t);
  if(d)m+=+d[1]*1440; if(h)m+=+h[1]*60; if(mi)m+=+mi[1]; return m||Infinity; }
function parseFin(t){ if(!t||t==='—'||t==='Completada') return Infinity;
  const m=/(\d{2})\/(\d{2}) (\d{2}):(\d{2})/.exec(t); if(!m) return Infinity;
  return (+m[2])*1e6+(+m[1])*1e4+(+m[3])*100+(+m[4]); }
const ORDEN_CAT=['Mantenimiento','Calidad','Cambio MP/Utillajes','Ajustes y Programacion','Esperas','Interrupciones','Mejoras'];
function ordenar(arr){
  const o=State.orden, byCod=(a,b)=>a.cod_maquina.localeCompare(b.cod_maquina);
  const cp={parada:0,preparacion:1,produccion:2,otra:3,cerrada:4};
  const A=arr.slice();
  if(o==='codigo') A.sort(byCod);
  else if(o==='oee') A.sort((a,b)=>(a.turno_kpi.oee)-(b.turno_kpi.oee)||byCod(a,b));
  else if(o==='urgencia') A.sort((a,b)=>(cp[a.estado_cat]-cp[b.estado_cat])||(a.turno_kpi.oee-b.turno_kpi.oee));
  else if(o==='prep') A.sort((a,b)=>((a.estado_cat==='preparacion'?0:1)-(b.estado_cat==='preparacion'?0:1))||byCod(a,b));
  else if(o==='prod') A.sort((a,b)=>((a.estado_cat==='produccion'?0:1)-(b.estado_cat==='produccion'?0:1))||byCod(a,b));
  // "Tiempo restante OF" ordena por la fecha FIN EST. exacta (minutos), más
  // precisa que el restante redondeado a horas. Completada/— van al final.
  else if(o==='restante') A.sort((a,b)=>parseFin(a.of_kpi.fin_est)-parseFin(b.of_kpi.fin_est));
  else if(o==='finest') A.sort((a,b)=>parseFin(a.of_kpi.fin_est)-parseFin(b.of_kpi.fin_est));
  else if(o==='tiempoparo') A.sort((a,b)=>(b.seg_paro||0)-(a.seg_paro||0));
  else if(o==='motivo') A.sort((a,b)=>{
    let ia=a.paro_categoria?ORDEN_CAT.indexOf(a.paro_categoria):99, ib=b.paro_categoria?ORDEN_CAT.indexOf(b.paro_categoria):99;
    if(ia<0)ia=98; if(ib<0)ib=98; return ia-ib||byCod(a,b);
  });
  document.querySelectorAll('.ms-orden button').forEach(b=>b.classList.toggle('on',b.dataset.o===o));
  return A;
}

// Tarjeta compacta (densidad Compacta)
function tarjetaCompacta(m){
  const col={produccion:'#2e9e5b',preparacion:'#d99000',parada:'#d23b3b',cerrada:'#c3cad3',otra:'#6b7280'}[m.estado_cat]||'#6b7280';
  // Si está parada, mostrar el motivo con su categoría (nivel Matriz2) y tiempo.
  const enParo = m.estado_cat==='parada' && m.paro && m.paro.motivo;
  const cCol = CAT_PARO_COL[m.paro_categoria]||'#d99000';
  // Jerarquía Matriz2 (3 niveles): Actividad · Categoría · Motivo.
  // Si actividad y categoría coinciden en texto, se muestra una sola vez.
  // Contexto (Actividad · Categoría) separado del MOTIVO, que se destaca.
  let contexto='';
  if(enParo){
    const arr=[m.estado, m.paro_categoria].filter(Boolean);
    const vistos=new Set([m.paro.motivo.toUpperCase()]);
    const uniq=arr.filter(x=>{const k=x.toUpperCase();if(vistos.has(k))return false;vistos.add(k);return true;});
    contexto=uniq.join(' · ');
  }
  const motivoParo = enParo ? `
    <div class="c-paro" style="background:${cCol}22;border-left:4px solid ${cCol}">
      <span class="c-paro-info">
        ${contexto?`<span class="c-paro-cat" style="color:${cCol}">${contexto}</span>`:''}
        <span class="c-paro-motivo">${m.paro.motivo}</span>
      </span>
      <span class="c-paro-t">${dur(m.paro.seg)}</span>
    </div>` : '';
  const bgParada = m.estado_cat==='parada' ? 'background:rgba(140,24,26,.04);' : '';
  return `<div class="tarjeta compacta" data-cod="${m.cod_maquina}" style="cursor:pointer;border-top:4px solid ${col};${bgParada}">
    <div class="cab"><div><div class="nom">${m.desc_maquina}</div><div class="cod">${m.cod_maquina}</div></div>
      <button class="t-ocultar" data-ocultar="${m.cod_maquina}" title="Ocultar" onclick="event.stopPropagation()">✕</button></div>
    <div class="c-ref"><div class="et">REFERENCIA</div>${fmt(m.producto)}</div>
    <div class="c-est"><div class="et">ESTADO</div><span style="color:${col};font-weight:800">● ${m.estado}</span></div>
    ${motivoParo}
  </div>`;
}

function esProblema(m){ return m.estado_cat==='parada' || (m.turno_kpi.oee||0)<50; }
function aplicarMenu(){
  let ms=(window._ultimoMural||[]).slice();
  ms=ms.filter(m=>!State.ocultas.includes(m.cod_maquina));
  // Las cerradas se ocultan por defecto; el contador "Cerradas" las muestra/oculta.
  // (Si se filtra explícitamente por 'cerrada', se muestran igualmente.)
  if(!State.verCerradas && State.filtroEstado!=='cerrada') ms=ms.filter(m=>m.estado_cat!=='cerrada');
  if(State.filtroEstado) ms=ms.filter(m=>m.estado_cat===State.filtroEstado);
  if(State.soloProblemas) ms=ms.filter(esProblema);
  ms=ordenar(ms);
  document.querySelectorAll('.ms-dens button').forEach(b=>b.classList.toggle('on',b.dataset.d===State.densidad));
  document.getElementById('msProblemas').classList.toggle('on',State.soloProblemas);
  document.getElementById('msProbN').textContent=(window._ultimoMural||[]).filter(esProblema).length;
  document.getElementById('msOcN').textContent=State.ocultas.length;
  if(window._contadores) renderContadores(window._contadores);  // refresca texto Ver/Ocultar Cerradas
  const mural=document.getElementById('mural');
  mural.className='dens-'+State.densidad;
  const render=State.densidad==='compacta'?tarjetaCompacta:tarjeta;
  mural.innerHTML=ms.length?ms.map(render).join(''):'<div class="vacio">Sin máquinas para este filtro.</div>';
}

function pinta(data){
  window._ultimoMural = data.maquinas || [];
  if(data.contadores) window._contadores = data.contadores;

}

  const oc=e.target.closest('[data-ocultar]');
  if(oc){ e.stopPropagation(); const c=oc.dataset.ocultar;
    if(!State.ocultas.includes(c)) State.ocultas.push(c); guardarPrefs(); aplicarMenu(); return; }
  const t = e.target.closest('.tarjeta'); if(!t) return;
  const m = (window._ultimoMural||[]).find(x=>x.cod_maquina===t.dataset.cod);
  if(m) abrirModal(m);
});
document.getElementById('mCerrar').addEventListener('click', cerrarModal);
document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target.id==='modalOverlay') cerrarModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') cerrarModal(); });
document.querySelectorAll('.m-tab').forEach(t=>t.addEventListener('click', ()=>{
  document.querySelectorAll('.m-tab').forEach(x=>x.classList.remove('activa'));
  t.classList.add('activa'); cargarPestana(t.dataset.p);
}));
document.getElementById('mActualizar').addEventListener('click', ()=>cargarPestana(modalPestana));

wireMenu();
aplicarZoom();
cargar();
setInterval(cargar, REFRESCO_MS);
</script>
</body>
</html>
